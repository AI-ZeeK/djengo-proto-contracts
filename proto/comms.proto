syntax = "proto3";

option csharp_namespace = "Comms.Grpc";

package comms;

// Communications service definition
service CommsService {
  // Chat operations
  rpc CreateChat (CreateChatRequest) returns (ChatResponse);
  rpc GetUserChats (GetUserChatsRequest) returns (GetUserChatsResponse);
  rpc GetChatMessages (GetChatMessagesRequest) returns (GetChatMessagesResponse);
  rpc SendMessage (SendMessageRequest) returns (MessageResponse);
  rpc MarkMessageAsRead (MarkMessageAsReadRequest) returns (MarkMessageAsReadResponse);
  
  // Participant operations
  rpc AddParticipant (AddParticipantRequest) returns (ParticipantResponse);
  rpc RemoveParticipant (RemoveParticipantRequest) returns (ParticipantResponse);
  
  // Push notification operations
  rpc AddPushSubscription (AddPushSubscriptionRequest) returns (PushSubscriptionResponse);
  rpc RemovePushSubscription (RemovePushSubscriptionRequest) returns (PushSubscriptionResponse);

  rpc SendAdminNotification (PushSubscriptionRequest) returns (PushSubscriptionResponse);
  rpc SendUserNotification (PushSubscriptionRequest) returns (PushSubscriptionResponse);
  rpc CreateInAppNotification (CreateInAppNotificationRequest) returns (CreateInAppNotificationResponse);
  rpc SendBatchNotification (BatchNotificationRequest) returns (BatchNotificationResponse);
}

message NotificationData {
  string entity_id = 1;
  string sender_id = 2;
  string sender_name = 3;
  string sender_avatar = 4;
  NotificationType entity_type = 5; // optional, if you may add more later
}


enum NotificationType {
  NEW_MESSAGE = 0;
  FRIEND_REQUEST = 1;
  SYSTEM_ALERT = 2;
  STAFF_INVITATION = 3;
  CHAT_CREATED = 4;
  // HR / business event types
  LEAVE_REQUEST = 5;
  LEAVE_APPROVED = 6;
  LEAVE_REJECTED = 7;
  PAYSLIP_READY = 8;
  CONTRACT_CREATED = 9;
  CONTRACT_ACTIVATED = 10;
  CONTRACT_TERMINATED = 11;
  DISCIPLINARY_ADDED = 12;
  TRAINING_ASSIGNED = 13;
  PERFORMANCE_REVIEW = 14;
  DOCUMENT_UPLOADED = 15;
  TASK_ASSIGNED = 16;
  BROADCAST = 17;
}

message CreateInAppNotificationRequest {
  string recipient_user_id = 1;
  string sender_user_id = 2;
  NotificationType type = 3;
  string text = 4;
  string link_url = 5;
}

message CreateInAppNotificationResponse {
  bool success = 1;
  string notification_id = 2;
  string message = 3;
}

message BatchNotificationRequest {
  repeated string recipient_user_ids = 1;
  string sender_user_id = 2;
  NotificationType type = 3;
  string text = 4;
  string link_url = 5;
  string title = 6;
  string body = 7;
  bool send_push = 8;
}

message BatchNotificationResponse {
  bool success = 1;
  int32 created_count = 2;
  string message = 3;
}

// Push notification service definition
message PushSubscriptionRequest {
  string title = 1;
  string body = 2;
  NotificationData data = 3;
  string recipient_user_id = 4;
}



// Message types
message CreateChatRequest {
  string name = 1;
  string chat_type = 2;
  repeated string participant_ids = 3;
  string creator_id = 4;
}

message ChatResponse {
  string chat_id = 1;
  string name = 2;
  string chat_type = 3;
  string created_at = 4;
  repeated Participant participants = 5;
}

message GetUserChatsRequest {
  string user_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message GetUserChatsResponse {
  repeated ChatSummary chats = 1;
  int32 total_count = 2;
}

message ChatSummary {
  string chat_id = 1;
  string name = 2;
  string chat_type = 3;
  string last_message = 4;
  string last_message_at = 5;
  int32 unread_count = 6;
  repeated Participant participants = 7;
}

message GetChatMessagesRequest {
  string chat_id = 1;
  string user_id = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message GetChatMessagesResponse {
  repeated Message messages = 1;
  int32 total_count = 2;
}

message SendMessageRequest {
  string chat_id = 1;
  string sender_id = 2;
  string content = 3;
  string message_type = 4;
  string file_url = 5;
  int64 file_size = 6;
  string file_type = 7;
}

message MessageResponse {
  string message_id = 1;
  string chat_id = 2;
  string sender_id = 3;
  string content = 4;
  string message_type = 5;
  string status = 6;
  string created_at = 7;
  string file_url = 8;
  int64 file_size = 9;
  string file_type = 10;
}

message MarkMessageAsReadRequest {
  string message_id = 1;
  string user_id = 2;
}

message MarkMessageAsReadResponse {
  bool success = 1;
  string message = 2;
}

message AddParticipantRequest {
  string chat_id = 1;
  string user_id = 2;
  string added_by = 3;
}

message RemoveParticipantRequest {
  string chat_id = 1;
  string user_id = 2;
  string removed_by = 3;
}

message ParticipantResponse {
  bool success = 1;
  string message = 2;
}

message AddPushSubscriptionRequest {
  string user_id = 1;
  string endpoint = 2;
  string p256dh = 3;
  string auth = 4;
  string platform = 5;
}

message RemovePushSubscriptionRequest {
  string user_id = 1;
  string endpoint = 2;
}

message PushSubscriptionResponse {
  bool success = 1;
  string message = 2;
}

// Common types
message Message {
  string message_id = 1;
  string chat_id = 2;
  string sender_id = 3;
  string content = 4;
  string message_type = 5;
  string status = 6;
  string created_at = 7;
  string file_url = 8;
  int64 file_size = 9;
  string file_type = 10;
  repeated MessageRead read_by = 11;
}

message MessageRead {
  string user_id = 1;
  string read_at = 2;
}

message Participant {
  string user_id = 1;
  bool is_admin = 2;
  string joined_at = 3;
  bool is_active = 4;
} 