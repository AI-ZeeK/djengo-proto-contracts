syntax = "proto3";


package admin;


// 👤 Profile Service - handles user profiles and user management
service AdminService {
  // admin services
  rpc AdminRegister(AdminRegisterRequest) returns (AuthInitialResponse);
  rpc AdminLogin(LoginRequest) returns (AuthInitialResponse);
  rpc AdminLogout(LogoutRequest) returns (SendOtpResponse);
  rpc AdminSendOtp(SendOtpRequest) returns (SendOtpResponse);
  rpc AdminVerifyOtp(VerifyOtpRequest) returns (VerifyOtpResponse);
  rpc AdminRefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
  rpc FetchAllAdmin(FetchAdminAccountRequest) returns (FetchAllAdminResponse);
  rpc FetchAdminAccount(FetchAdminAccountRequest) returns (FetchAdminAccountResponse);
  rpc ValidateAdminAccount(ValidateAdminAccountRequest) returns (FetchAdminAccountResponse);
  rpc UpdateAdminProfile(UpdateAdminProfileRequest) returns (AdminAccountResponse);
  rpc ChangeAdminPassword(ChangeAdminPasswordRequest) returns (ChangeAdminPasswordResponse);

  rpc GetUser(GetUserRequest) returns (UserResponse);

  // Analytics
  rpc OverviewAnalytics(EmptyRequest) returns (OverviewAnalyticsResponse);

  // Admin account management (admin-panel RBAC)
  rpc CreateAdminAccount(CreateAdminAccountRequest) returns (AdminAccountResponse);
  rpc UpdateAdminAccount(UpdateAdminAccountRequest) returns (AdminAccountResponse);

  // Admin role management
  rpc ListAdminRoles(EmptyRequest) returns (ListAdminRolesResponse);
  rpc GetAdminRole(GetAdminRoleRequest) returns (AdminRoleResponse);
  rpc CreateAdminRole(CreateAdminRoleRequest) returns (AdminRoleResponse);
  rpc UpdateAdminRole(UpdateAdminRoleRequest) returns (AdminRoleResponse);
  rpc DeleteAdminRole(DeleteAdminRoleRequest) returns (DeleteAdminRoleResponse);

  // Admin action audit log
  rpc RecordAdminAction(RecordAdminActionRequest) returns (RecordAdminActionResponse);
  rpc ListAdminActionLogs(ListAdminActionLogsRequest) returns (ListAdminActionLogsResponse);

  // Fine-grained admin permissions (entity grants on roles)
  rpc GetAdminPermissionGroups(EmptyRequest) returns (GetAdminPermissionGroupsResponse);
  rpc GetAdminRolePermissions(GetAdminRolePermissionsRequest) returns (GetAdminRolePermissionsResponse);
  rpc GetAdminRoleCompanies(GetAdminRoleCompaniesRequest) returns (GetAdminRoleCompaniesResponse);
}

// Platform admin pages/sections a role may access. Mirrors frontend/admin nav sections.
enum AdminModule {
  DASHBOARD = 0;
  CHATS = 1;
  SUPPORT = 2;
  MANAGEMENT = 3;
  SECURITY = 4;
  FINANCIAL = 5;
  SETTINGS = 6;
  ADMIN_MANAGEMENT = 7;
}

// A single module grant: presence = can VIEW that page. can_manage additionally
// allows mutating actions within it — viewing a page never implies acting on it.
message ModuleAccess {
  AdminModule module = 1;
  bool can_manage = 2;
}

message RolePermissionGrant {
  string permission_name = 1;
  bool state = 2;
}

message AdminCompanyGrant {
  string company_id = 1;
  optional string organization_id = 2;
  optional string company_name = 3;
}

message GetAdminRoleCompaniesRequest {
  int32 role_id = 1;
}

message GetAdminRoleCompaniesResponse {
  bool success = 1;
  bool scopes_all_companies = 2;
  repeated AdminCompanyGrant companies = 3;
}

message PermissionEntry {
  int32 permission_id = 1;
  string permission_name = 2;
  string description = 3;
  int32 level = 4;
  string category = 5;
}

message PermissionGroupData {
  int32 group_id = 1;
  string group_name = 2;
  string description = 3;
  int32 level = 4;
  string category = 5;
  string group_type = 6;
  repeated PermissionEntry permissions = 7;
}

message GetAdminPermissionGroupsResponse {
  bool success = 1;
  repeated PermissionGroupData groups = 2;
}

message GetAdminRolePermissionsRequest {
  int32 role_id = 1;
}

message GetAdminRolePermissionsResponse {
  bool success = 1;
  repeated RolePermissionGrant permissions = 2;
}

message CreateAdminAccountRequest {
  string email = 1;
  string password = 2;
  optional string first_name = 3;
  optional string last_name = 4;
  int32 role_id = 5;
}

message UpdateAdminAccountRequest {
  string user_id = 1;
  optional int32 role_id = 2;
  optional bool is_active = 3;
  optional bool is_blocked = 4;
}

message UpdateAdminProfileRequest {
  string user_id = 1;
  optional string first_name = 2;
  optional string last_name = 3;
  optional string avatar_url = 4;
}

message ChangeAdminPasswordRequest {
  string user_id = 1;
  string current_password = 2;
  string new_password = 3;
}

message ChangeAdminPasswordResponse {
  bool success = 1;
  optional string message = 2;
}

message AdminAccountResponse {
  bool success = 1;
  optional string message = 2;
  optional User user = 3;
}

message GetAdminRoleRequest {
  int32 role_id = 1;
}

message CreateAdminRoleRequest {
  string role_name = 1;
  optional string description = 2;
  bool is_super_admin = 3;
  repeated ModuleAccess modules = 4;
  repeated RolePermissionGrant permissions = 5;
  bool scopes_all_companies = 6;
  repeated AdminCompanyGrant companies = 7;
}

message UpdateAdminRoleRequest {
  int32 role_id = 1;
  optional string role_name = 2;
  optional string description = 3;
  optional bool is_super_admin = 4;
  repeated ModuleAccess modules = 5;
  repeated RolePermissionGrant permissions = 6;
  optional bool scopes_all_companies = 7;
  repeated AdminCompanyGrant companies = 8;
}

message DeleteAdminRoleRequest {
  int32 role_id = 1;
}

message DeleteAdminRoleResponse {
  bool success = 1;
  optional string message = 2;
}

message AdminRoleResponse {
  bool success = 1;
  optional string message = 2;
  optional Role role = 3;
}

message ListAdminRolesResponse {
  bool success = 1;
  repeated Role roles = 2;
}

message RecordAdminActionRequest {
  optional string admin_user_id = 1;
  string action = 2;
  optional string resource_type = 3;
  optional string resource_id = 4;
  optional string outcome = 5;
  optional string ip = 6;
  optional string metadata_json = 7;
}

message RecordAdminActionResponse {
  bool success = 1;
}

message ListAdminActionLogsRequest {
  optional string admin_user_id = 1;
  optional string action = 2;
  optional string resource_type = 3;
  optional string start_date = 4;
  optional string end_date = 5;
  int32 page = 6;
  int32 page_size = 7;
}

message AdminActionLog {
  string audit_id = 1;
  optional string admin_user_id = 2;
  string action = 3;
  optional string resource_type = 4;
  optional string resource_id = 5;
  string outcome = 6;
  optional string ip = 7;
  optional string metadata_json = 8;
  string occurred_at = 9;
  optional string admin_name = 10;
  optional string admin_email = 11;
}

message ListAdminActionLogsResponse {
  bool success = 1;
  repeated AdminActionLog logs = 2;
  int32 total = 3;
  int32 page = 4;
  int32 page_size = 5;
}

message FetchAllAdminResponse {
  repeated User users = 1;
  bool success = 2 ;
  string message = 3;
}
  
message FetchAdminAccountRequest {
  string user_id = 1;
}
message ValidateAdminAccountRequest {
  string token = 1;
}

message FetchAdminAccountResponse {
  User user = 1;
  bool success = 2;
  string message = 3;
}






// 📝 REQUEST MESSAGES

message EmptyRequest {}



message Role {
  string role_id = 1;
  string role_name = 2;
  bool is_active = 3;
  bool is_super_admin = 4;
  repeated ModuleAccess modules = 5;
  optional string description = 6;
  int32 admin_count = 7;
  repeated string permission_names = 8;
  bool scopes_all_companies = 9;
  repeated AdminCompanyGrant companies = 10;
  /// Client-safe hint: super-admin role has every permission (is_super_admin itself stays server-only).
  bool has_all_permissions = 11;
}


message VerifyOtpResponse {
  bool success = 1;
  optional string error = 2;
  optional string message = 3;
  optional string access_token = 4;
  optional User user = 5;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message SendOtpRequest {
  string token = 1;
  SendOtpType type = 2;
}

message VerifyOtpRequest {
  string token = 1;
  string otp = 2;
  SendOtpType type = 3;
}

message SendOtpResponse {
  bool success = 1;
  optional string error = 2;
  optional string message = 3;
}

message RefreshTokenResponse {
  bool success = 1;
  User user = 2;
  string access_token = 3;
}




message AuthInitialResponse {
  bool success = 1;
  optional string error = 2;
  optional string message = 3;
  optional string auth_token = 4;
}
  
message AdminRegisterRequest {
  string email = 1;
  string password = 2;
  string platform_ref = 3;

}

message RegisterRequest {
  string email = 1;
  string password = 2;
  string phone_number = 3;
  string company_ref = 4;
  string role_name = 5;
}


enum ROLES_ENUM {
  CLIENT = 0;
  BUSINESS_USER = 1;
  STAFF = 2;
}

message LogoutRequest {
  string user_id = 1;
}

message RefreshTokenRequest {
  string token = 1;
}



message GetUserRequest {
  string user_id = 1;
}

message GetUserByEmailRequest {
  string email = 1;
}


message UserResponse {
  bool success = 1;
  optional string error = 2;
  optional User user = 3;
}

message GetUserByEmailResponse {
  bool success = 1;
  optional string error = 2;
  optional string message = 3;
  optional User user = 4;
}



message GetUserContactsResponse {
  bool success = 1;
  optional string error = 2;
  repeated Contact contacts = 3;
  int32 total_count = 4;
}



// 🏗️ DATA MODELS

message User {
  string user_id = 1;
  string email = 2;
  optional string username = 3;
  optional string first_name = 4;
  optional string last_name = 5;
  optional string phone_number = 6;
  optional string avatar_url = 7;
  optional string last_seen = 8;
  string created_at = 9;
  string updated_at = 10;
  bool email_verified = 11;
  optional Address address = 12;
  optional Role role = 13;
  optional bool is_active = 14;
  optional bool is_blocked = 15;
}

message Contact {
  string user_id = 1;
  string email = 2;
  optional string username = 3;
  optional string first_name = 4;
  optional string last_name = 5;
  optional string avatar_url = 6;
  optional string last_seen = 7;
  bool email_verified = 8;
}

message Organization {
  string organization_id = 1;
  string name = 2;
  string phone_number = 3;
  string email = 4;
  string registration_number = 5;
  string registration_date = 6;
  string creator_id = 7;
  string created_at = 8;
  string updated_at = 9;
  optional string deleted_at = 10;
}

message Address {
  optional string address_id = 1;
  optional string street = 2;
  optional string building = 3;
  optional string apartment = 4;
  optional string district = 5;
  optional string city = 6;
  optional string state = 7;
  optional string postal_code = 8;
  optional string country = 9;
  optional string landmark = 10;
  optional string direction_url = 11;
  optional double latitude = 12;
  optional double longitude = 13;
}

message UserRole {
  string user_role_id = 1;
  string role_name = 2;
  bool is_active = 3;
}



enum SendOtpType {
  REGISTRATION = 0;
  SIGNIN = 1;
  ADMIN_REGISTRATION = 2;
  ADMIN_SIGNIN = 3;
  FORGOT_PASSWORD = 4;
}

// Analytics Messages
message TotalOrganizationsData {
  int32 count = 1;
  repeated TrendData trend_data = 2;
}

message OrganizationWithCounts {
  string organization_id = 1;
  string name = 2;
  string phone_number = 3;
  string email = 4;
  string registration_number = 5;
  string registration_date = 6;
  bool is_active = 7;
  bool is_multi_company = 8;
  string creator_id = 9;
  string created_at = 10;
  string updated_at = 11;
  optional string deleted_at = 12;
  int32 staff_count = 13;
  int32 business_user_count = 14;
  int32 access_control_count = 15;
  int32 companies_count = 16;
}

message TopPerformingOrganizationsData {
  repeated OrganizationWithCounts top_organizations = 1;
}

message YAxis {
  int32 max = 1;
  repeated int32 sections = 2;
  string label = 3;
}

message XAxis {
  repeated string sections = 1;
  string label = 2;
}

message DailyActiveUsersData {
  string day = 1;
  string date = 2;
  int32 active_users = 3;
  bool is_today = 4;
}

message PeakDay {
  string day = 1;
  string date = 2;
  int32 active_users = 3;
  bool is_today = 4;
}

message DailyActiveUsersSummary {
  int32 total_users = 1;
  double avg_daily_active = 2;
  PeakDay peak_day = 3;
}

message DailyActiveUsersAnalytics {
  YAxis y_axis = 1;
  XAxis x_axis = 2;
  repeated DailyActiveUsersData data = 3;
  DailyActiveUsersSummary summary = 4;
}

message TrendData {
  string name = 1;
  int32 value = 2;
}

message ActiveUsersCountData {
  int32 count = 1;
  double percentage = 2;
  string trend = 3;
  repeated TrendData trend_data = 4;
}

message OverviewAnalyticsResponse {
  TotalOrganizationsData total_organizations = 1;
  TopPerformingOrganizationsData top_performing_organizations = 2;
  DailyActiveUsersAnalytics daily_active_users = 3;
  ActiveUsersCountData active_users_count = 4;
}
