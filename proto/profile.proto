

syntax = "proto3";

import "google/protobuf/struct.proto";

package profile;


// 👤 Profile Service - handles user profiles and user management
service ProfileService {
  // Payroll: Get staff for payroll with base salary and adjustments
  rpc GetStaffForPayroll(GetStaffForPayrollRequest) returns (GetStaffForPayrollResponse);


  // Get staff payroll details (meta + adjustments)
  rpc GetStaffPayrollDetails(GetStaffPayrollDetailsRequest) returns (GetStaffPayrollDetailsResponse);


  rpc GetOverviewAnalytics(OverviewAnalyticsRequest) returns (OverviewAnalyticsResponse);
  rpc GetStaffAnalytics(StaffAnalyticsRequest) returns (StaffAnalyticsResponse);
  // user services
  rpc ValidateAccount(ValidateAccountRequest) returns (ValidateAccountResponse);
  rpc Register(RegisterRequest) returns (AuthInitialResponse);
  rpc Login(LoginRequest) returns (AuthInitialResponse);
  rpc SendOtp(SendOtpRequest) returns (SendOtpResponse);
  rpc VerifyOtp(VerifyOtpRequest) returns (VerifyOtpResponse);
  rpc Logout(LogoutRequest) returns (SendOtpResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
  
  rpc GetRoles(EmptyRequest) returns (GetRolesResponse);
  
  // User Management
  rpc GetUser(GetUserRequest) returns (UserResponse);
  rpc GetBusinessUser(GetUserRequest) returns (BusinessUserResponse);
  rpc GetUserByEmail(GetUserByEmailRequest) returns (GetUserByEmailResponse);
  rpc UpdateUserStatus(UpdateUserStatusRequest) returns (UpdateUserStatusResponse);
  rpc GetUserContacts(GetUserContactsRequest) returns (GetUserContactsResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc GetUserCountForOrganization(GetUserCountForOrganizationRequest) returns (GetUserCountForOrganizationResponse);
  
  rpc GetLoginHistory(GetLoginHistoryRequest) returns (LoginHistoryResponse);
  
  // BUSINESS ROLES
  rpc CreateOrUpdateBusinessUserRole(CreateOrUpdateBusinessUserRoleRequest) returns (CreateOrUpdateBusinessUserRoleResponse);
  
  rpc FetchOrganizationRoles(OrganizationRoleIdRequest) returns (FetchOrganizationRolesResponse);
  rpc FetchOrganizationRolesCount(OrganizationRoleIdRequest) returns (FetchOrganizationRolesCountResponse);
  
  rpc GetStaffDetails(StaffDetailsRequest) returns (StaffDetailsResponse);
  rpc GetManyStaffDetails(ManyStaffDetailsRequest) returns (ManyStaffDetailsResponse);
  rpc GetCompanyStaffs(PaginatedCompanyRequest) returns (ManyStaffDetailsResponse);
  rpc GetCompanyStaff(GetCompanyStaffRequest) returns (GetCompanyStaffResponse);

  
  // Staff Invitations
  rpc SendStaffInvitations(SendStaffInvitationsRequest) returns (SendStaffInvitationsResponse);
  rpc GetInvitationByCode(GetInvitationByCodeRequest) returns (GetInvitationByCodeResponse);
  rpc AcceptInvitation(AcceptInvitationRequest) returns (AcceptInvitationResponse);
  rpc DeclineInvitation(DeclineInvitationRequest) returns (InvitationStatusResponse);
  rpc DeleteStaffInvitation(GetInvitationByCodeRequest) returns (InvitationStatusResponse);
  rpc ResendStaffInvitation(ResendStaffInvitationRequest) returns (ResendStaffInvitationResponse);
  rpc GetInvitationsByCompany(PaginatedCompanyRequest) returns (GetInvitationsByCompanyResponse);
  
  
  rpc AdminGetUsers(GetUsersRequest) returns (GetUsersResponse); 
  rpc AdminUsersAnalytics(AdminUsersAnalyticsRequest) returns (AdminUsersAnalyticsResponse);
// ANALYTICS
  rpc ActiveUsersCount(EmptyRequest) returns (ActiveUsersCountResponse);
  rpc DailyActiveUsersAnalytics(EmptyRequest) returns (DailyActiveUsersAnalyticsResponse);
  rpc GetOrganizationBusinessUsers(GetOrganizationBusinessUsersRequest) returns (GetOrganizationBusinessUsersResponse);
  
  // Staff Management
  rpc OnboardStaff(OnboardStaffRequest) returns (OnboardStaffResponse);
  rpc AddStaffPaymentAdjustment(AddStaffPaymentAdjustmentRequest) returns (AddStaffPaymentAdjustmentResponse);
  rpc StaffProbationHistory(StaffProbationHistoryRequest) returns (StaffProbationHistoryResponse);
}
// --- Staff Management Messages ---

enum PAYMENT_FREQUENCY_ENUM {
  MONTHLY = 0;
  BIWEEKLY = 1;
  WEEKLY = 2;

}

message OnboardStaffRequest {
  string staff_id = 1;
  double base_salary = 2;
  string company_id = 3;
  string organization_id = 4;
  repeated StaffDocument documents = 6;
  optional string probation_end = 7; // ISO date string
  optional string probation_period = 8; 
  string account_name = 9;
  string account_number = 10;
  string bank_name = 11;
  PAYMENT_FREQUENCY_ENUM payment_frequency = 12;


}


// --- Staff Payroll Details ---
message GetStaffPayrollDetailsRequest {
  string staff_id = 1;
  string company_id = 2;
  string organization_id = 3;
}

message StaffPayrollDetails {
  string staff_meta_id = 1;
  string staff_id = 2;
  double base_salary = 3;
  string bank_name = 4;
  string account_number = 5;
  string account_name = 6;
  PAYMENT_FREQUENCY_ENUM payment_frequency = 7;
  string created_at = 8;
  string updated_at = 9;
}

message StaffPaymentAdjustmentProto {
  string payment_adjustment_id = 1;
  string meta_id = 2;
  double amount = 3;
  string type = 4;
  optional string reason = 5;
  string effective_at = 6;
  optional string expire_at = 7;
}

message GetStaffPayrollDetailsResponse {
  bool success = 1;
  optional string error = 2;
  optional StaffPayrollDetails details = 3;
  repeated StaffPaymentAdjustmentProto adjustments = 4;
}



message StaffDocument {
  string type = 1;
  string url = 2;
  optional string uploaded_at = 3; // ISO date string
}

message OnboardStaffResponse {
  bool success = 1;
  optional string error = 2;
  optional StaffMeta staff_meta = 3;
}


// 
message GetCompanyStaffRequest {
  string company_id = 1;
  string organization_id = 2;
  string staff_id = 3;
}

message GetCompanyStaffResponse {
  bool success = 1;
  optional string error = 2;
  optional Staff staff = 3;
}

message AddStaffPaymentAdjustmentRequest {
  string staff_id = 1;
  double amount = 2;
  string type = 3; // "BONUS" or "FINE"
  optional string reason = 4;
  optional string effective_at = 5; // ISO date string
  optional string expire_at = 6; // ISO date string
  optional Timeline period = 7; // "1M", "3M", "6M"
}

message AddStaffPaymentAdjustmentResponse {
  bool success = 1;
  optional string error = 2;
  optional StaffPaymentAdjustment adjustment = 3;
}

message StaffPaymentAdjustment {
  string adjustment_id = 1;
  string meta_id = 2;
  double amount = 3;
  string type = 4;
  optional string reason = 5;
  string effective_at = 6;
  optional string expire_at = 7;
}

message StaffProbationHistoryRequest {
  string staff_id = 1;
  optional ProbationPeriod new_probation = 2;
}

message ProbationPeriod {
  string start = 1; // ISO date string
  string end = 2;   // ISO date string
}

message StaffProbationHistoryResponse {
  repeated ProbationPeriod history = 1;
  optional string error = 2;
}

message LoginHistoryResponse {
  repeated LoginHistory login_history = 1;
}

message OverviewAnalyticsRequest {
  string user_id = 1;
  string organization_id = 2;
  string company_id = 3;
  Timeline timeline = 4;
  string start_date = 5;
  string end_date = 6;
}

// Analytics block for cards
message AnalyticsBlock {
  string title = 1;
  string description = 2;
  double amount = 3;
  string trend = 4;
  double percentage = 5;
  repeated TrendData chart_data = 6;
  string slug = 7; // Optional, for unique identification (e.g., branch_analytics)
}

// Chart block for charts array
message ChartBlock {
  string slug = 1;
  string type = 2; // e.g., "line"
  string title = 3;
  string dataKey = 4;
  repeated TrendData data = 5;
}

// Updated response for overview analytics
message OverviewAnalyticsResponse {
  repeated AnalyticsBlock cards = 1;
  repeated ChartBlock charts = 2;
}

// Staff Analytics
message StaffAnalyticsRequest {
  string company_id = 1;
  string organization_id = 2;
  Timeline timeline = 3;
  string start_date = 4;
  string end_date = 5;
}

message StaffAnalyticsResponse {
  int32 amount = 1;
  string trend = 2;
  double percentage = 3;
  repeated TrendData chart_data = 4;
}

message LoginHistory {
  string session_id = 1;
  string user_id = 2;
  string device_info = 3;
  bool is_active = 4;
  string login_at = 5;
  SessionSource source = 9;
}

enum RequestFilter {
  ALL = 0;
  ACTIVE = 1;
  INACTIVE = 2; 
}

// Resend Staff Invitation
message ResendStaffInvitationRequest {
  string invitation_code = 1;
}

message ResendStaffInvitationResponse {
  bool success = 1;
  optional string error = 2;
  string message = 3;
}

message PaginatedCompanyRequest {
  // Company identification
  string company_id = 1;
  string organization_id = 2;
  
  // Pagination and sorting
  optional string search = 3;
  optional int32 page = 4;
  optional int32 page_size = 5;
  optional string sort_by = 6;
  optional string sort_order = 7;
  optional RequestFilter filter = 8;


}

message GetInvitationsByCompanyResponse {
  bool success = 1;
  optional string error = 2;
  repeated StaffInvitation invitations = 3;
  TableMeta meta = 4;
}

message CompanyIdRequest {
  string company_id = 1;
  string organization_id = 2;
}


message GetLoginHistoryRequest {
  string user_id = 1;
  optional int32 page = 2;
  optional int32 page_size = 3;
}

enum Timeline {
  _1m = 0;
  _3m = 1;
  _6m = 2;
  _1y = 3;
  all = 4;
}

message GetUserCountForOrganizationRequest {
  string organization_id = 1;
  bool is_active = 2;
}

message GetUserCountForOrganizationResponse {
  int32 count = 1;
}

message YAxis {
  int32 max = 1;
  repeated int32 sections = 2;
  string label = 3;
}

message XAxis {
  repeated string sections = 1;
  string label = 2;
}

message DailyActiveUsersData {
  string day = 1;
  string date = 2;
  int32 active_users = 3;
  bool is_today = 4;
}

message PeakDay {
  string day = 1;
  string date = 2;
  int32 active_users = 3;
  bool is_today = 4;
}

message DailyActiveUsersSummary {
  int32 total_users = 1;
  double avg_daily_active = 2;
  PeakDay peak_day = 3;
}

message DailyActiveUsersAnalyticsResponse {
  YAxis y_axis = 1;
  XAxis x_axis = 2;
  repeated DailyActiveUsersData data = 3;
  DailyActiveUsersSummary summary = 4;
}

message TrendData {
  string name = 1;
  int32 value = 2;
}

message ActiveUsersCountResponse {
  int32 count = 1;
  double percentage = 2;
  string trend = 3;
  repeated TrendData trend_data = 4;
}


message AdminUsersAnalyticsRequest {
  optional Timeline timeline = 1;
  optional string start_date = 2;
  optional string end_date = 3;
  optional string role_id = 4;
}

message Analytic {
  int32 value = 1;
  string trend = 2;
  string percentage = 3;
  
}

message AdminUsersAnalyticsResponse {
  Analytic total_users = 1;
  Analytic new_users = 2;
  Analytic active_users = 3;
  Analytic business_users = 4;
  Analytic pending_users = 5;
  Analytic deactivated_users = 6;
  Analytic high_value_users = 7;
  Analytic at_risk_users = 8;
}

message GetUsersRequest {
  string search = 1;
  int32 page = 2;
  int32 page_size = 3;
  string sort_by = 4;
  string sort_order = 5;
}

message TableMeta {
  int32 total = 1;
  int32 current_page = 2;
  int32 page_size = 3;
  int32 total_pages = 4;
  int32 next_page = 5;
  int32 prev_page = 6;

}

message GetUsersResponse {
  bool success = 1;
  optional string error = 2;
  repeated User users = 3;
  TableMeta meta = 4;
}


message StaffDetailsRequest {
  string staff_id = 1;  
  string company_id = 2;
}
message ManyStaffDetailsRequest {
  repeated string staff_ids = 1;  
  string company_id = 2;
}

message StaffMeta {
  string staff_meta_id = 1;
  string staff_id = 2;
  double base_salary = 3;
  bool is_onboarded = 4;
  optional string probation_end = 5;
  string currency_code = 6;
  string created_at = 7;
  string updated_at = 8;
}

message StaffProbationHistory {
  string probation_history_id = 1;
  string staff_id = 2;
  string start_date = 3;
  string end_date = 4;
  string created_at = 5;
}

message Staff {
  string staff_id = 1;
  string company_id = 2;
  string user_id = 3;
  optional string branch_id = 4;
  string email = 5;
  optional string designation = 6;
  bool is_active = 7;
  string created_at = 10;
  string updated_at = 11;
  optional User user = 12;
  string role_id = 13;
  optional OrganizationRole role = 14;
  optional StaffMeta meta_data = 15;
  repeated StaffProbationHistory probation_history = 16;

}

message StaffDetailsResponse {
  bool success = 1;
  optional string error = 2;
  optional Staff staff = 3;
}
message ManyStaffDetailsResponse {
  bool success = 1;
  optional string error = 2;
  repeated Staff staffs = 3;
  optional  TableMeta meta = 4;

}

// Staff Invitation Messages

message StaffInvitationItem {
  string email = 1;
  string role_id = 2;
  optional string branch_id = 4;
  optional string department_id = 6;
  InvitationType type = 7;
}

message SendStaffInvitationsRequest {
  string organization_id = 1;
  string company_id = 2;
  string invited_by = 3;
  repeated StaffInvitationItem invitations = 5;
}

message InvitationResult {
  bool success = 2;
  string message = 3;
}

message SendStaffInvitationsResponse {
  bool success = 1;
  optional string error = 2;
  string message = 3;
  repeated InvitationResult results = 4;
}

message GetInvitationByCodeRequest {
  string invitation_code = 1;
}

enum InvitationStatus {
  PENDING = 0;
  VIEWED = 1;
  ACCEPTED = 2;
  DECLINED = 3;
  EXPIRED = 4;
}

enum InvitationType {
  STAFF_INVITATION = 0;
  PARTNER_INVITATION = 1;
}

message OrganizationRole {
  string role_id = 1;
  string organization_id = 2;
  string company_id = 3;
  string branch_id = 4;
  string name = 5;
  string slug = 6;
  string description = 7;
  bool is_active = 8;
  bool is_org_level = 10;
  string created_at = 11;
  string updated_at = 12;
  string deleted_at = 13;
}


message StaffInvitation {
  string invitation_id = 1;
  string company_id = 2;
  optional string branch_id = 3;
  optional string department_id = 4;
  optional string role_id = 5;
  optional OrganizationRole role = 6;
  string email = 7;
  string invitation_code = 8;
  // InvitationStatus status = 9;
  string invited_by =10;
  string expires_at = 11;
  optional string responsed_at = 12;
  string created_at = 15;
  string status = 16;
  optional Company company = 17;
  InvitationType type = 18;
}

message GetInvitationByCodeResponse {
  bool success = 1;
  optional string error = 2;
  optional StaffInvitation invitation = 3;
}


message AcceptInvitationRequest {
  string invitation_code = 1;
  string first_name = 2;
  string last_name = 3;
  optional string phone_number = 4;
  optional string country_code = 5;
  string password = 6;
  AddressRequest address = 7;
}

message AcceptInvitationResponse {
  bool success = 1;
  optional string error = 2;
  string message = 3;
  optional Staff staff = 4;
}

message DeclineInvitationRequest {
  string invitation_code = 1;
}

message InvitationStatusResponse {
  bool success = 1;
  optional string error = 2;
  string message = 3;
}

message ValidateAccountRequest {
  string token = 1;
}

message ValidateAccountResponse {
  User user = 1;
  bool success = 2;
  string message = 3;
}


message OrganizationRoleIdRequest {
  string organization_role_id = 1;
}

message FetchOrganizationRolesResponse {
  repeated Role roles = 1;
}

message FetchOrganizationRolesCountResponse {
  int32 count = 1;
}


message CommonResponseArray {
  bool success = 1;
  string message = 2;
  int32 status = 3;
  repeated google.protobuf.Struct data = 4;
  repeated Role roles = 5;
}


