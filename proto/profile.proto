  optional string district = 5;
  optional string city = 6;
  optional string state = 7;
  optional string postal_code = 8;
  optional string country = 9;
  optional string landmark = 10;
  optional string direction_url = 11;
  optional double latitude = 12;
  optional double longitude = 13;
}
  
// --- Payroll Staff For Payroll ---
message GetStaffForPayrollRequest {
  string company_id = 1;
  string organization_id = 2;
  int32 month = 3; 
  int32 year = 4;  
  string search = 5;
  string sort_by = 8;
  string sort_order = 9;
}

message GetStaffForPayrollResponse {
  bool success = 1;
  repeated PayrollStaff payroll = 2;
  optional string error = 3;
}

message PayrollStaff {
  string staff_id = 1;
  string staff_email = 2;
  User user = 3;
  double total_adjustment = 4;
  double adjustments_counts = 5;

}

message PayrollAdjustment {
  string type = 1; // 'BONUS' or 'FINE'
  double amount = 2;
  optional string reason = 3;
  string effective_at = 4;
  optional string expire_at = 5;

}
