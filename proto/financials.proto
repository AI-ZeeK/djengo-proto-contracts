  repeated GuestInvoiceLineItemProto line_items = 18;
  string created_at       = 19;
  string updated_at       = 20;
}

message CreateGuestInvoiceRequest {
  string guest_id         = 1;
  string company_id       = 2;
  string organization_id  = 3;
  optional string reservation_id = 4;
  optional string order_id = 5;
  int64  subtotal_minor   = 6;
  int64  discount_minor   = 7;
  int64  tax_minor        = 8;
  string currency_code    = 9;
  optional string due_date = 10;
  optional string notes   = 11;
  repeated GuestInvoiceLineItemProto line_items = 12;
}

message GetGuestInvoiceRequest    { string invoice_id = 1; }
message IssueGuestInvoiceRequest  { string invoice_id = 1; string issued_by = 2; }
message VoidGuestInvoiceRequest   { string invoice_id = 1; string voided_by = 2; string reason = 3; }

message ListGuestInvoicesRequest {
  string company_id        = 1;
  string organization_id   = 2;
  optional string guest_id = 3;
  optional string status   = 4;
  optional int32 page      = 5;
  optional int32 page_size = 6;
}

message ListGuestInvoicesResponse {
  repeated GuestInvoiceProto invoices = 1;
  TableMeta meta                      = 2;
}

message GuestPaymentProto {
  string payment_id      = 1;
  string invoice_id      = 2;
  string guest_id        = 3;
  string company_id      = 4;
  string organization_id = 5;
  int64  amount_minor    = 6;
  string currency_code   = 7;
  string payment_method  = 8;
  optional string reference = 9;
  string status          = 10;
  optional string paid_at = 11;
  optional string recorded_by = 12;
  optional string notes  = 13;
  string created_at      = 14;
}

message RecordGuestPaymentRequest {
  string invoice_id      = 1;
  string guest_id        = 2;
  string company_id      = 3;
  string organization_id = 4;
  int64  amount_minor    = 5;
  string currency_code   = 6;
  string payment_method  = 7;
  optional string reference = 8;
  string recorded_by     = 9;
  optional string notes  = 10;
}

message ListGuestPaymentsRequest {
  string company_id        = 1;
  string organization_id   = 2;
  optional string guest_id = 3;
  optional string invoice_id = 4;
  optional int32 page      = 5;
  optional int32 page_size = 6;
}

message ListGuestPaymentsResponse {
  repeated GuestPaymentProto payments = 1;
  TableMeta meta                      = 2;
}
