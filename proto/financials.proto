// ── Module 6: Facility & asset management (scaffold) ──────────────────────

service FacilityAssetService {
  rpc ListAssets             (ListFacilityAssetsRequest)       returns (ListFacilityAssetsResponse);
  rpc RegisterAsset          (RegisterFacilityAssetRequest)    returns (FacilityAssetRecord);
  rpc UpdateAsset            (UpdateFacilityAssetRequest)      returns (FacilityAssetRecord);
  rpc GetDepreciationSchedule(GetDepreciationScheduleRequest)  returns (AssetDepreciationSchedule);
}

message ListFacilityAssetsRequest {
  string organization_id = 1;
  string company_id = 2;
  optional string branch_id = 3;
  int32 page = 4;
  int32 page_size = 5;
}

message ListFacilityAssetsResponse {
  repeated FacilityAssetRecord assets = 1;
  TableMeta meta = 2;
}

message RegisterFacilityAssetRequest {
  string organization_id = 1;
  string company_id = 2;
  optional string branch_id = 3;
  string name = 4;
  string category_code = 5;
  optional string serial_number = 6;
  int64 acquisition_cost_minor = 7;
}

message FacilityAssetRecord {
  string asset_id = 1;
  string organization_id = 2;
  string company_id = 3;
  optional string branch_id = 4;
  string name = 5;
  string category_code = 6;
  optional string serial_number = 7;
  int64 acquisition_cost_minor = 8;
  string status = 9;
  string created_at = 10;
  // Depreciation fields
  optional int32  useful_life_months             = 11;
  optional int64  salvage_value_minor            = 12;
  optional string depreciation_method            = 13; // STRAIGHT_LINE | DECLINING_BALANCE
  int64           accumulated_depreciation_minor = 14;
  int64           net_book_value_minor           = 15;
  optional string last_depreciation_at           = 16;
}

message UpdateFacilityAssetRequest {
  string          asset_id             = 1;
  string          company_id           = 2;
  optional int32  useful_life_months   = 3;
  optional int64  salvage_value_minor  = 4;
  optional string depreciation_method  = 5; // STRAIGHT_LINE | DECLINING_BALANCE
}

message GetDepreciationScheduleRequest {
  string asset_id      = 1;
  string company_id    = 2;
  int32  months_ahead  = 3; // how many future months to project (default 12)
}

message DepreciationLine {
  string period                          = 1; // "2026-05"
  int64  depreciation_amount_minor       = 2;
  int64  accumulated_depreciation_minor  = 3;
  int64  net_book_value_minor            = 4;
}

message AssetDepreciationSchedule {
  string asset_id                        = 1;
  string name                            = 2;
  int64  acquisition_cost_minor          = 3;
  int64  salvage_value_minor             = 4;
  int32  useful_life_months              = 5;
  string depreciation_method             = 6;
  int64  accumulated_depreciation_minor  = 7;
  int64  net_book_value_minor            = 8;
  repeated DepreciationLine schedule     = 9;
}

// ── Budget Variance Report ────────────────────────────────────────────────
message GetBudgetVarianceReportRequest {
  string          company_id      = 1;
  string          organization_id = 2;
  int32           month           = 3;
  int32           year            = 4;
  optional string branch_id       = 5;
}

message BudgetVarianceLine {
  string allocation_id     = 1;
  string name              = 2;
  string budget_type       = 3;
  double budgeted_amount   = 4;
  double actual_spend      = 5;
  double variance          = 6;
  double variance_percent  = 7;
  string status            = 8; // UNDER_BUDGET | OVER_BUDGET | ON_TRACK
}

message BudgetVarianceReport {
  string  budget_id              = 1;
  string  company_id             = 2;
  int32   month                  = 3;
  int32   year                   = 4;
  double  total_budgeted         = 5;
  double  total_actual_spend     = 6;
  double  total_variance         = 7;
  double  total_variance_percent = 8;
  repeated BudgetVarianceLine lines = 9;
