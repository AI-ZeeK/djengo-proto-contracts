// --- Bulk Export Payroll Schedules ---
message ExportPayrollSchedulesRequest {
  repeated string schedule_ids = 1; // List of PayrollSchedule IDs to export
  string company_id = 2;
  string organization_id = 3;
  enum ExportType {
    CSV = 0;
    EXCEL = 1;
  }
  ExportType export_type = 4;
  string user_id = 5;
}

message ExportPayrollSchedulesResponse {
  bool success = 1;
  string message = 2;
  bytes file_content = 3; // The exported file as bytes (for direct download)
  string file_name = 4;   // Suggested file name (e.g., payrolls.xlsx or payrolls.csv)
}

// --- Staff Payment History ---
message GetStaffPaymentHistoryRequest {
  string user_id = 1;
  string company_id = 2;
  string organization_id = 3;
  int32 page = 4;
  int32 page_size = 5;
  string sort_by = 6;        // Field to sort by (e.g. "name", "scheduled_at")
  string sort_order = 7;     // Sort order (e.g. "asc", "desc")
}

message GetStaffPaymentHistoryResponse {
  bool success = 1;
  repeated PaymentHistoryRow history = 2;
  TableMeta meta = 3;
  string error = 4;
}

message PaymentHistoryRow {
  string transaction_id = 1;
  double amount = 2;
  string currency_code = 3;
  string transaction_ref = 4;
  string status = 5;
  string created_at = 6;
  string completed_at = 7;
  string company_id = 8;
  string specification = 9;
}

// --- Get Staff Payment Details ---
message GetStaffPaymentDetailsRequest {
  string staff_id = 1;
  string company_id = 2;
  string organization_id = 3;
}

message GetStaffPaymentDetailsResponse {
  bool success = 1;
  string error = 2;
  StaffPaymentDetails details = 3;
}

message StaffPaymentDetails {
  string staff_id = 1;
  string company_id = 2;
  string organization_id = 3;
  string bank_name = 4;
  string account_number = 5;
  string account_name = 6;
  PAYMENT_FREQUENCY_ENUM payment_frequency = 7;
  string base_salary = 8;
  string sort_code = 9;
  string created_at = 10;
}

enum PAYMENT_FREQUENCY_ENUM {
  MONTHLY = 0;
  BIWEEKLY = 1;
  WEEKLY = 2;

}

message CreatePaymentDetailsRequest {
  string staff_id = 1;
  string company_id = 2;
  string organization_id = 3;
  string bank_name = 4;
  string account_number = 5;
  PAYMENT_FREQUENCY_ENUM payment_frequency = 8;
  string base_salary = 9;
  string account_name = 10;
  optional string sort_code = 11;
}

message CreatePaymentDetailsResponse {
  bool success = 1;
  string message = 2;
}
message GetBanksRequest {
  string country_code = 1;
}

message Bank {
  string name = 1;
  string code = 2;
}

message GetBanksResponse {
  repeated Bank banks = 1;
}
// --- Bank Validation ---
message ValidatePaymentDetailsRequest {
  string bank_name = 1;
  string account_number = 2;
  string bank_code = 3;
  string country_code = 4; // e.g. "NG" for Nigeria, "US" for United States


}

message ValidatePaymentDetailsResponse {
  bool is_valid = 1;
  string account_name = 2; // If available from provider
  string message = 3;
}

message CompanyGrowthTrendRequest {
  string companyId = 1;
  Timeline timeline = 2;
  string startDate = 3;
  string endDate = 4;
}

// Response for company growth trend data
message CompanyGrowthTrendResponse {
  repeated ChartData chart_data = 1;
}

message CompanyFinancialAnalyticsRequest {
  string companyId = 1;
  string organizationId = 2;
  Timeline timeline = 3;
  string startDate = 4;
  string endDate = 5;
  TransactionCategory category = 6;
}

message CompanyFinancialAnalyticsResponse {
  double amount = 1;
  string trend = 2;
  double percentage = 3;
  repeated ChartData chart_data = 4;
}

message ChartData {
  string name = 1;
  double value = 2;
}

enum Timeline {
  _1m = 0;
  _3m = 1;
  _6m = 2;
  _1y = 3;
  all = 4;
}
  
 enum TransactionCategory {
    Salary = 0;
    Budget = 1;
    Order = 2;
    Expense = 3;
    Deposit = 4;
    Withdrawal = 5;
    Transfer = 6;
}

message EmptyRequest {}

message CreateWalletRequest {
  string entity_id = 1;
  WALLET_ENTITY_TYPE_ENUM entity_type = 2;
  string currency_code = 3;
}


message GetCountryRequest {
  string country_code = 1;
}

message UpdateWalletRequest {
  string entity_id = 1;
  string entity_type = 2;
  string currency_code = 3;
  double balance = 4;
}

message WalletTransactionRequest {
  string wallet_id = 1;
  double amount = 2;
  string description = 3;
  string kind = 4; // "credit" or "debit"
}

message WalletTransferRequest {
  string from_entity_type = 1;
  string from_entity_id = 2;
  string currency_code = 3;
  string to_entity_type = 4;
  string to_entity_id = 5;
  double amount = 6;
  string description = 7;
}

message WalletReply {
  bool success = 1;
  string message = 2;
  Wallet wallet = 3;
}
message GetCountryResponse {
  bool success = 1;
  optional string error = 2;
  Country country = 3;
}
message GetCountriesResponse {
  bool success = 1;
  optional string error = 2;
  repeated Country countries = 3;
}

message Country {
  string country_code = 1;
  string country_name = 2;
  string currency_code = 3;
  // bool is_active = 5;

}
message Wallet {
  string wallet_id = 1;
  string entity_id = 2;
  WALLET_ENTITY_TYPE_ENUM entity_type = 3;
  string organization_id = 4; // Always set
  string branch_id = 5; // Optional
  string company_id = 6; // Optional
  string currency_code = 7;
  double balance = 8;
  string status = 9;
  string created_at = 10;
  string updated_at = 11;
}

enum WALLET_ENTITY_TYPE_ENUM {
  ORGANIZATION = 0;
  COMPANY = 1;
  BRANCH = 2;
  ADMIN = 3;
  USER = 4;
} 


// Budget allocation details
message BudgetAllocation {
  string allocation_id = 1;
  string budget_id = 2;
  string organization_id = 3; // Required
  optional string branch_id = 4; // Optional
  string company_id = 5; // Optional
  BUDGET_ENTITY_TYPE_ENUM entity_type = 6;
  string entity_id = 7;
  string name = 8;
  string description = 9;
  double allocated_amount = 10;
  string allocated_by = 11;
  /// When set, ties the line to a cost center (minor units path unchanged).
  optional string cost_center_id = 12;
}

// Payroll snapshot embedded in budget responses
message PayrollSummary {
  string payroll_id    = 1;
  string schedule_id   = 2;
  PayrollState status  = 3;
  // Minor currency units (e.g. kobo/cents) — never IEEE float for money at API boundary.
  int64 total_amount_minor  = 4;
  int32  staff_count   = 5;
  bool   is_settled    = 6; // true when APPROVED / PAID / CLOSED
}

// Monthly budget resource
message MonthlyBudget {
  string budget_id = 1;
  string organization_id = 2;
  string company_id = 3;
  int32 month = 4;
  int32 year = 5;
  double total_amount = 6;
  double allocated_amount = 7;
  repeated BudgetAllocation allocations = 8;
  BudgetState budget_state = 9;
  optional PayrollSummary payroll_summary = 10;
}

// Payroll resource
message Payroll {
  string payroll_id = 1;
  string parent = 2;
  int32 month = 3;
  int32 year = 4;
  string entity_id = 5;
  BUDGET_ENTITY_TYPE_ENUM entity_type = 6;
  // Sum of staff lines in minor units (matches EF PayrollStaff.amount int).
  int64 total_amount_minor = 7;
  PayrollState payroll_state = 8;
  repeated PayrollStaff staff = 9;
  string schedule_id = 10;
}

// Payroll staff resource
message PayrollStaff {
  string payroll_staff_id = 1;
  string staff_id = 2;
  string payroll_id = 3;
  int64 amount_minor = 4;
  PayrollState payroll_state = 5;
}

// --- Requests/Responses ---
message CreateMonthlyBudgetRequest {
  string budget_id = 1;
  string organization_id = 2;
  string company_id = 3;
  string branch_id = 4;
  int32 month = 5;
  int32 year = 6;
  double total_amount = 7;
  double allocated_amount = 8;
  repeated BudgetAllocation allocations = 9;
  BudgetState budget_state = 10;
  string budget_type = 11; // "organization", "company", or "branch"
}

// Get by ID
message GetMonthlyBudgetRequest {
  string budget_id = 1;
    string organization_id = 2;
  string company_id = 3;
  string budget_type = 4; // "organization", "company", or "branch"
}

// Update
message UpdateMonthlyBudgetRequest {
  string budget_id = 1;
  string organization_id = 2;
  string company_id = 3;
  optional double total_amount = 4;
  optional double allocated_amount = 5;
  optional BudgetState budget_state = 6;
  string budget_type = 7; // "organization", "company", or "branch"
}

// Pagination, filtering, sorting
message ListMonthlyBudgetsRequest {
  optional string search = 1;
  optional int32 page = 2;
  optional int32 page_size = 3;
  optional string sort_by = 4;
  optional string sort_order = 5;
  optional BudgetFilter filter = 6;
}

message BudgetFilter {
  optional string organization_id = 1;
  optional string company_id = 2;
  optional int32 year = 3;
  optional int32 month = 4;
}

message ListMonthlyBudgetsResponse {
  repeated MonthlyBudget budgets = 1;
  TableMeta meta = 2;
}

message TableMeta {
  int32 total = 1;
  int32 current_page = 2;
  int32 page_size = 3;
  int32 total_pages = 4;
  int32 next_page = 5;
  int32 prev_page = 6;
}
message CreateBudgetAllocationRequest {
  string parent = 1;
  BudgetAllocation budget_allocation = 2;
}
message ListBudgetAllocationsRequest {
  string parent = 1;
  int32 page_size = 2;
  string page_token = 3;
}
message ListBudgetAllocationsResponse {
  repeated BudgetAllocation allocations = 1;
  string next_page_token = 2;
}

message GetBudgetCreatePayrollContextRequest {
  string organization_id = 1;
  string company_id = 2;
  int32 month = 3;
  int32 year = 4;
  /** Empty = company-wide schedule (BranchId null); otherwise match branch. */
  string branch_id = 5;
}

message GetBudgetCreatePayrollContextResponse {
  bool found = 1;
  string payroll_id = 2;
  string schedule_id = 3;
  string branch_id = 4;
  int64 payroll_total_minor = 5;
  int32 staff_count = 6;
  bool is_settled = 7;
  string payroll_status = 8;
  string schedule_status = 9;
  PayrollState payroll_state = 10;
}

message CreatePayrollRequest {
  string organization_id = 1;
  string company_id = 2;
  Payroll payroll = 3;
  string user_id = 4; // User initiating the payroll creation (for audit logging)
}
message RunPayrollRequest {
  string name = 1;
  // When set, overrides schedule branch only for linkage + budget-scope resolution.
  optional string branch_id = 2;
}
message GetPayrollRequest {
  string name = 1;
}
message ListPayrollsRequest {
  string parent = 1;
  int32 page_size = 2;
  string page_token = 3;
}
message ListPayrollsResponse {
  repeated Payroll payrolls = 1;
  string next_page_token = 2;
}

// --- Enums ---
enum BUDGET_ENTITY_TYPE_ENUM {
  BUDGET_ENTITY_ORGANIZATION = 0;
  BUDGET_ENTITY_COMPANY = 1;
  BUDGET_ENTITY_BRANCH = 2;
}

enum BUDGET_TYPE_ENUM {
  SALARY = 0;
  INVENTORY = 1;
  BASE = 2;
}

enum BudgetState {
  BUDGET_STATE_UNSPECIFIED = 0;
  BUDGET_PENDING = 1;
  BUDGET_APPROVED = 2;
  BUDGET_REJECTED = 3;
}
enum PayrollState {
  PAYROLL_STATE_UNSPECIFIED = 0;
  PAYROLL_PENDING = 1;
  PAYROLL_RUNNING = 2;
  PAYROLL_COMPLETED = 3;
  PAYROLL_FAILED = 4;
}

// --- Payroll Analytics ---
message GetPayrollAnalyticsRequest {
  string company_id = 1;
  string organization_id = 2;
}

message PayrollAnalyticsCard {
  string title = 1;
  double total = 2;
  string status = 3;
  optional string info = 4;
  double growth = 5;
  int32 count = 6;
  string description = 7;
}

message PayrollAnalyticsChart {
  string title = 1;
  string type = 2; // "line" or "bar"
  repeated PayrollAnalyticsChartData data = 3;
  string data_key = 4;
  string color = 5;

}

message PayrollAnalyticsChartData {
  string name = 1;
  double value = 2;
  
}

message GetPayrollAnalyticsResponse {
  repeated PayrollAnalyticsCard cards = 1;
  repeated PayrollAnalyticsChart charts = 2;
      optional string alert = 3;
}


  // --- Payroll Schedules Table ---
  message ListPayrollSchedulesRequest {
    string organization_id = 1;
    string company_id = 2;
    string search = 3;         // Search by name or other fields
    int32 page = 4;            // 1-based page number
    int32 page_size = 5;       // Items per page
    string sort_by = 6;        // Field to sort by (e.g. "name", "scheduled_at")
    string sort_order = 7;     // "asc" or "desc"
  }

  message PayrollScheduleTableRow {
    string schedule_id = 1;
    string name = 2;
    string organization_id = 3;
    string company_id = 4;
    optional string branch_id = 5;
    string scheduled_at = 6;
    optional int32 week = 7;
    optional int32 month = 8;
    int32 year = 9;
    PAYMENT_FREQUENCY_ENUM payment_frequency = 10;
    string schedule_status = 11; // e.g. "active", "cancelled"
    string payroll_status = 12; // e.g. "pending", "completed"
    int32 staff_count = 13;
    string created_at = 14;
    string updated_at = 15;
  }

  message ListPayrollSchedulesResponse {
    repeated PayrollScheduleTableRow schedules = 1;
    TableMeta meta = 2;
  }

  // --- Staff Payroll Table for Payroll Period ---
enum StaffPayrollInclusionFilter {
  STAFF_PAYROLL_ALL = 0;
  STAFF_PAYROLL_INCLUDED = 1;
  STAFF_PAYROLL_NOT_INCLUDED = 2;
}

message ListStaffPayrollForPeriodRequest {
  string company_id = 1;
  string organization_id = 2;
  string user_id = 3; // User requesting the data (for RBAC and audit logging)
  string query_key = 4;
  StaffPayrollInclusionFilter filter = 5;
  string search = 6;
  string sort_by = 7;
  string sort_order = 8 ;
}

message StaffPayrollRow {
  string staff_id = 1;
  string staff_email = 2;
    User user = 3;
  // Optionally add more user fields as needed
  bool included_in_payroll = 4;
  int64 payroll_amount_minor = 5;
  int64 base_salary_minor = 6;
  int64 total_adjustment_minor = 7;
  // Optionally: repeated PayrollAdjustment adjustments = 8;
}

message ListStaffPayrollForPeriodResponse {
  bool success = 1;
  repeated StaffPayrollRow staff = 2;
  TableMeta meta = 3;
  string error = 4;
  string payroll_schedule_id = 5; // New field to return the associated payroll schedule ID
  int32 period_month = 6;
  int32 period_year = 7;
  string schedule_scheduled_at = 8; // From payroll schedule (e.g. planned run / payout date reference)
}

// --- Upsert Payroll Staff for a Payroll Period ---
message CreateOrUpdatePayrollStaffRequest {
    string company_id = 1;
  string organization_id = 2;
  string user_id = 3; // User performing the update (for RBAC and audit logging)
  string payroll_schedule_id = 4; // The payroll schedule/period to update
  repeated string staff_ids = 5;  // The list of staff IDs to include in payroll for this period
  int32 month = 6;  // Used to create the schedule if it does not yet exist
  int32 year = 7;   // Used to create the schedule if it does not yet exist
}

message CreateOrUpdatePayrollStaffResponse {
  bool success = 1;
  repeated PayrollStaff staff = 2; // The updated list of PayrollStaff for the period
  string error = 3;
  string message = 4;
}

message User {
  string user_id = 1;
  string email = 2;
  optional string username = 3;
  optional string first_name = 4;
  optional string last_name = 5;
  optional string phone_number = 6;
  optional string avatar_url = 7;
  optional string last_seen = 8;
  string created_at = 9;
  string updated_at = 10;
  string last_login = 11;
  bool email_verified = 12;
}

// ═══════════════════════════════════════════════════════════════════
// INVENTORY
// ═══════════════════════════════════════════════════════════════════

enum InventoryStatusEnum {
  INVENTORY_PENDING              = 0;
  INVENTORY_APPROVED             = 1;
  INVENTORY_REJECTED             = 2;
  INVENTORY_ADJUSTMENT_REQUESTED = 3;
}

message InventoryProto {
  string inventory_id    = 1;
  string organization_id = 2;
  string company_id      = 3;
  optional string branch_id    = 4;
  string name            = 5;
  optional string description  = 6;
  int32  month           = 7;
  int32  year            = 8;
  optional int32  week   = 9;
  InventoryStatusEnum status   = 10;
  string created_by      = 11;
  string created_at      = 12;
  string updated_at      = 13;
  repeated InventoryItemProto items = 14;
}

message InventoryItemProto {
  string inventory_item_id          = 1;
  string inventory_id               = 2;
  optional string branch_id                 = 3;
  string name                       = 4;
  optional string description               = 5;
  double amount                     = 6;
  InventoryStatusEnum status        = 7;
  optional string approved_by               = 8;
  optional string approved_at               = 9;
  optional string rejected_by               = 10;
  optional string rejection_message         = 11;
  optional string adjustment_requested_by   = 12;
  optional string adjustment_note           = 13;
  optional string reviewed_at               = 14;
  string created_by                 = 15;
  string created_at                 = 16;
  string updated_at                 = 17;
}

message CreateInventoryRequest {
  string organization_id = 1;
  string company_id      = 2;
  optional string branch_id     = 3;
  string name            = 4;
  optional string description   = 5;
  int32  month           = 6;
  int32  year            = 7;
  optional int32  week   = 8;
  string created_by      = 9;
  repeated UpsertInventoryItemRequest items = 10;
}

message GetInventoryRequest {
  string inventory_id = 1;
}

// Optional narrowing filters (branch, period, status)
message InventoryFilter {
  optional string branch_id           = 1;
  optional int32  month               = 2;
  optional int32  year                = 3;
  optional InventoryStatusEnum status = 4;
}

message ListInventoriesRequest {
  // Required scope — always fetching for a specific company inside an org
  string organization_id      = 1;
  string company_id           = 2;
  optional string branch_id   = 3;  // narrow to a single branch if provided
  optional string search      = 4;
  optional int32  page        = 5;
  optional int32  page_size   = 6;
  optional string sort_by     = 7;
  optional string sort_order  = 8;
  optional InventoryFilter filter = 9;
}

message ListInventoriesResponse {
  repeated InventoryProto inventories = 1;
  TableMeta meta                      = 2;
}

message UpsertInventoryItemRequest {
  optional string inventory_item_id = 1;
  string inventory_id   = 2;
  optional string branch_id         = 3;
  string name           = 4;
  optional string description       = 5;
  double amount         = 6;
  string created_by     = 7;
}

message ListInventoryItemsRequest {
  string inventory_id                    = 1;
  optional string branch_id             = 2;
  optional InventoryStatusEnum status   = 3;
  int32 page      = 4;
  int32 page_size = 5;
}

message ListInventoryItemsResponse {
  repeated InventoryItemProto items = 1;
  TableMeta meta                    = 2;
}

message ApproveInventoryItemRequest {
  string inventory_item_id = 1;
  string approved_by       = 2;
  optional string message  = 3;
}

message RejectInventoryItemRequest {
  string inventory_item_id  = 1;
  string rejected_by        = 2;
  string rejection_message  = 3;
}

message RequestInventoryAdjustmentRequest {
  string inventory_item_id = 1;
  string requested_by      = 2;
  string adjustment_note   = 3;
}

