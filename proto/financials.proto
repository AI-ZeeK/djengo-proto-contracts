
syntax = "proto3";

option csharp_namespace = "Financials.Grpc";

package financials;

// --- Event Log Listing ---
service EventLogService {
  rpc ListAllEventLogs (ListEventLogsRequest) returns (ListEventLogsResponse);
  rpc ListOrganizationEventLogs (ListEventLogsRequest) returns (ListEventLogsResponse);
}

message ListEventLogsRequest {
  optional string search = 1;
  optional int32 page = 2;
  optional int32 page_size = 3;
  optional string sort_by = 4;
  optional string sort_order = 5;
  optional string role = 6; // For RBAC (e.g. "admin", "org_head")
  optional string organization_id = 7;
  optional string company_id = 8;
  optional string event_type = 9;
}

message ListEventLogsResponse {
  repeated EventLogRow logs = 1;
  TableMeta meta = 5;
}

message EventLogRow {
  string event_id = 1;
  string event_type = 2;
  string user_id = 3;
  string organization_id = 4;
  string company_id = 5;
  string timestamp = 6;
  string details = 7;
}
// --- Approval Chain ---
service ApprovalChainService {
  rpc GetApprovalChain (GetApprovalChainRequest) returns (ApprovalChainProto);
  rpc ApproveStep (ApproveStepRequest) returns (ApprovalChainProto);
  rpc RejectStep (RejectStepRequest) returns (ApprovalChainProto);
}

message ApprovalChainProto {
  string approval_chain_id = 1;
  string entity_type = 2; // "PAYROLL", "BUDGET", etc.
  string entity_id = 3;
  string organization_id = 4;
  string company_id = 5;
  string status = 6;
  repeated ApprovalStepProto steps = 7;
  string created_at = 8;
  string updated_at = 9;
}

message ApprovalStepProto {
  string approval_step_id = 1;
  int32 step_order = 2;
  string organization_id = 3;
  string company_id = 4;
  string role_id = 5;
  string role_type = 6; // BUSINESS_USER or STAFF
  string approver_user_id = 8;
  string status = 9;
  string approved_at = 10;
  string comment = 11;
}

message GetApprovalChainRequest {
  string entity_type = 1;
  string entity_id = 2;
}

message ApproveStepRequest {
  string approval_chain_id = 1;
  string approval_step_id = 2;
  string approver_staff_id = 3;
  string comment = 4;
}

message RejectStepRequest {
  string approval_chain_id = 1;
  string approval_step_id = 2;
  string approver_staff_id = 3;
  string comment = 4;
}
// --- Bank List ---


service FinancialsService {
  // Get paginated payment history for a staff member
  rpc GetStaffPaymentHistory (GetStaffPaymentHistoryRequest) returns (GetStaffPaymentHistoryResponse);



  // ...existing rpcs...
  rpc GetStaffPaymentDetails (GetStaffPaymentDetailsRequest) returns (GetStaffPaymentDetailsResponse);



  rpc ListPayrollSchedules (ListPayrollSchedulesRequest) returns (ListPayrollSchedulesResponse);
  rpc CreateWallet (CreateWalletRequest) returns (WalletReply);
  rpc UpdateWallet (UpdateWalletRequest) returns (WalletReply);
  rpc Credit (WalletTransactionRequest) returns (WalletReply);
  rpc Debit (WalletTransactionRequest) returns (WalletReply);
  rpc Transfer (WalletTransferRequest) returns (WalletReply);

  rpc GetCountries(EmptyRequest) returns (GetCountriesResponse);
  rpc GetCountry(GetCountryRequest) returns (GetCountryResponse);

  // Staff Payroll Table for a Payroll Period
  rpc ListStaffPayrollForPeriod(ListStaffPayrollForPeriodRequest) returns (ListStaffPayrollForPeriodResponse);

  // Upsert payroll staff for a payroll period (add/remove staff in bulk)
  rpc CreateOrUpdatePayrollStaff (CreateOrUpdatePayrollStaffRequest) returns (CreateOrUpdatePayrollStaffResponse);


  rpc GetBanks (GetBanksRequest) returns (GetBanksResponse);

  // Additional RPC methods for financial analytics can be added here
  rpc GetCompanyFinancialAnalytics (CompanyFinancialAnalyticsRequest) returns (CompanyFinancialAnalyticsResponse);

  // Returns only the flexible periodical growth trend data for a company (for charting)
  rpc GetCompanyGrowthTrend (CompanyGrowthTrendRequest) returns (CompanyGrowthTrendResponse);

  // Company-wide financial overview (period-aware: expenses, budget, payroll, inventory)
  rpc GetCompanyFinancialOverview (GetCompanyFinancialOverviewRequest) returns (GetCompanyFinancialOverviewResponse);

  // Budget
  rpc CreateMonthlyBudget(CreateMonthlyBudgetRequest) returns (MonthlyBudget);
  rpc GetMonthlyBudget(GetMonthlyBudgetRequest) returns (MonthlyBudget);
  rpc UpdateMonthlyBudget(UpdateMonthlyBudgetRequest) returns (MonthlyBudget);
  rpc ListMonthlyBudgets(ListMonthlyBudgetsRequest) returns (ListMonthlyBudgetsResponse);
  rpc CreateBudgetAllocation(CreateBudgetAllocationRequest) returns (BudgetAllocation);
  rpc ListBudgetAllocations(ListBudgetAllocationsRequest) returns (ListBudgetAllocationsResponse);
  rpc GetBudgetAnalytics (GetBudgetAnalyticsRequest) returns (GetBudgetAnalyticsResponse);
  /** Single payload for monthly budget create UI: payroll totals + settlement (authoritative). */
  rpc GetBudgetCreatePayrollContext (GetBudgetCreatePayrollContextRequest) returns (GetBudgetCreatePayrollContextResponse);
  // Payroll
  rpc CreatePayroll(CreatePayrollRequest) returns (Payroll);
  rpc RunPayroll(RunPayrollRequest) returns (Payroll);
  rpc GetPayroll(GetPayrollRequest) returns (Payroll);
  rpc ListPayrolls(ListPayrollsRequest) returns (ListPayrollsResponse);
  rpc GetPayslipPdf(GetPayslipPdfRequest) returns (PayslipPdfResponse);


  // Payroll Analytics
  rpc GetPayrollAnalytics (GetPayrollAnalyticsRequest) returns (GetPayrollAnalyticsResponse);

  // Bulk export payroll schedules (CSV/Excel)
  rpc ExportPayrollSchedules (ExportPayrollSchedulesRequest) returns (ExportPayrollSchedulesResponse);


  // Bank validation
  rpc ValidatePaymentDetails (ValidatePaymentDetailsRequest) returns (ValidatePaymentDetailsResponse);

  rpc CreatePaymentDetails (CreatePaymentDetailsRequest) returns (CreatePaymentDetailsResponse);

  // ── Inventory ──────────────────────────────────────────────────────────────
  rpc CreateInventory (CreateInventoryRequest) returns (InventoryProto);
  rpc GetInventory (GetInventoryRequest) returns (InventoryProto);
  rpc ListInventories (ListInventoriesRequest) returns (ListInventoriesResponse);
  rpc UpsertInventoryItem (UpsertInventoryItemRequest) returns (InventoryItemProto);
  rpc ListInventoryItems (ListInventoryItemsRequest) returns (ListInventoryItemsResponse);
  rpc ApproveInventoryItem (ApproveInventoryItemRequest) returns (InventoryItemProto);
  rpc RejectInventoryItem (RejectInventoryItemRequest) returns (InventoryItemProto);
  rpc RequestInventoryAdjustment (RequestInventoryAdjustmentRequest) returns (InventoryItemProto);
  rpc GetInventoryAnalytics (GetInventoryAnalyticsRequest) returns (GetInventoryAnalyticsResponse);

  // ── Cost Centers ───────────────────────────────────────────────────────────
  rpc CreateCostCenter (CreateCostCenterRequest) returns (CostCenterProto);
  rpc GetCostCenter    (GetCostCenterRequest)    returns (CostCenterProto);
  rpc ListCostCenters  (ListCostCentersRequest)  returns (ListCostCentersResponse);
  rpc UpdateCostCenter (UpdateCostCenterRequest) returns (CostCenterProto);

  // ── Financial Periods ──────────────────────────────────────────────────────
  rpc OpenFinancialPeriod  (OpenFinancialPeriodRequest)  returns (FinancialPeriodProto);
  rpc LockFinancialPeriod  (LockFinancialPeriodRequest)  returns (FinancialPeriodProto);
  rpc GetFinancialPeriod   (GetFinancialPeriodRequest)   returns (FinancialPeriodProto);
  rpc ListFinancialPeriods (ListFinancialPeriodsRequest) returns (ListFinancialPeriodsResponse);

  // ── Budget Approval Chain ─────────────────────────────────────────────────
  rpc ApproveBudget (ApproveBudgetRequest) returns (MonthlyBudget);
  rpc RejectBudget  (RejectBudgetRequest)  returns (MonthlyBudget);

  // ── Financial Audit Log (admin) ───────────────────────────────────────────
  rpc ListFinancialAuditLogs (ListFinancialAuditLogsRequest) returns (ListFinancialAuditLogsResponse);

  // ── Budget Variance Report ────────────────────────────────────────────────
  rpc GetBudgetVarianceReport (GetBudgetVarianceReportRequest) returns (BudgetVarianceReport);
}

