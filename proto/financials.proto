// ── Procurement ────────────────────────────────────────────────────────────

service ProcurementService {
  // Vendors
  rpc CreateVendor          (CreateVendorRequest)          returns (VendorProto);
  rpc GetVendor             (GetVendorRequest)             returns (VendorProto);
  rpc ListVendors           (ListVendorsRequest)           returns (ListVendorsResponse);
  rpc UpdateVendor          (UpdateVendorRequest)          returns (VendorProto);
  rpc ApproveVendor         (ApproveVendorRequest)         returns (VendorProto);
  rpc SuspendVendor         (SuspendVendorRequest)         returns (VendorProto);

  // Purchase Requests
  rpc CreatePurchaseRequest  (CreatePurchaseRequestRequest)  returns (PurchaseRequestProto);
  rpc GetPurchaseRequest     (GetPurchaseRequestRequest)     returns (PurchaseRequestProto);
  rpc ListPurchaseRequests   (ListPurchaseRequestsRequest)   returns (ListPurchaseRequestsResponse);
  rpc ApprovePurchaseRequest (ApprovePurchaseRequestRequest) returns (PurchaseRequestProto);
  rpc RejectPurchaseRequest  (RejectPurchaseRequestRequest)  returns (PurchaseRequestProto);

  // Purchase Orders
  rpc CreatePurchaseOrder  (CreatePurchaseOrderRequest)  returns (PurchaseOrderProto);
  rpc GetPurchaseOrder     (GetPurchaseOrderRequest)     returns (PurchaseOrderProto);
  rpc ListPurchaseOrders   (ListPurchaseOrdersRequest)   returns (ListPurchaseOrdersResponse);
  rpc IssuePurchaseOrder   (IssuePurchaseOrderRequest)   returns (PurchaseOrderProto);
  rpc CancelPurchaseOrder  (CancelPurchaseOrderRequest)  returns (PurchaseOrderProto);

  // Goods Receipt Notes
  rpc CreateGoodsReceiptNote  (CreateGoodsReceiptNoteRequest)  returns (GoodsReceiptNoteProto);
  rpc GetGoodsReceiptNote     (GetGoodsReceiptNoteRequest)     returns (GoodsReceiptNoteProto);
  rpc ListGoodsReceiptNotes   (ListGoodsReceiptNotesRequest)   returns (ListGoodsReceiptNotesResponse);
  rpc CompleteGoodsReceipt    (CompleteGoodsReceiptRequest)    returns (GoodsReceiptNoteProto);
}

// --- Vendor ---

