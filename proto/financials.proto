  string name               = 4;
  optional string contact_person = 5;
  optional string email     = 6;
  optional string phone_number = 7;
  optional string address   = 8;
  optional string tax_id    = 9;
  optional string bank_name = 10;
  optional string bank_account_number = 11;
  string currency_code      = 12;
  int32  payment_terms_days = 13;
  string status             = 14; // PENDING | APPROVED | SUSPENDED | BLACKLISTED
  optional string approved_by = 15;
  optional string approved_at = 16;
  string created_at         = 17;
  string updated_at         = 18;
}

message CreateVendorRequest {
  string organization_id    = 1;
  string company_id         = 2;
  string name               = 3;
  optional string contact_person = 4;
