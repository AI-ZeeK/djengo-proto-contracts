// Analytics Messages
message TrendData {
  string name = 1;
  int32 value = 2;
}

message OrganizationAnalyticsRequest {
  string timeline = 1;
  optional string start_date = 2;
  optional string end_date = 3;
}

message OrganizationMetric {
  int32 count = 1;
  double percentage = 2;
  string trend = 3;
}

message OrganizationMetricWithTrend {
  int32 count = 1;
  double percentage = 2;
  string trend = 3;
  repeated TrendData trend_data = 4;
}

message TransactionMetric {
  int32 value = 1;
  double percentage = 2;
  string trend = 3;
}

message OrganizationAnalyticsResponse {
  OrganizationMetricWithTrend total_organizations = 1;
  OrganizationMetric active_organizations = 2;
  OrganizationMetric pending_organizations = 3;
  OrganizationMetric inactive_organizations = 4;
  OrganizationMetric high_revenue_organizations = 5;
  OrganizationMetric large_organizations = 6;
  TransactionMetric average_transactions = 7;
}

message TotalOrganizationsResponse {
  int32 count = 1;
  double percentage = 2;
  string trend = 3;
  repeated TrendData trend_data = 4;
}

message TopPerformingOrganizationsRequest {
  optional int32 limit = 1;
}

message OrganizationWithCounts {
  string organization_id = 1;
  string name = 2;
  string phone_number = 3;
  string email = 4;
  string registration_number = 5;
  string registration_date = 6;
  bool is_active = 7;
  bool is_multi_company = 8;
  string creator_id = 9;
  string created_at = 10;
  string updated_at = 11;
  optional string deleted_at = 12;
  int32 staff_count = 13;
  int32 business_user_count = 14;
  int32 access_control_count = 15;
  int32 companies_count = 16;
}

message TopPerformingOrganizationsResponse {
  repeated OrganizationWithCounts top_organizations = 1;
}

// Tables Messages
message GetOrganizationsRequest {
  optional string search = 1;
  optional int32 page = 2;
  optional int32 page_size = 3;
  optional string sort_by = 4;
  optional string sort_order = 5;
}

message OrganizationAddress {
  optional string street = 1;
  optional string building = 2;
  optional string apartment = 3;
  optional string city = 4;
  optional string state = 5;
  optional string country = 6;
  optional string postal_code = 7;
}

message OrganizationMeta {
  int32 organization_roles = 1;
  bool is_multi_company = 2;
  int32 companies_count = 3;
  int32 total_business_users = 4;
  int32 active_business_users = 5;
  int32 inactive_business_users = 6;
}

message OrganizationDetail {
  string organization_id = 1;
  string name = 2;
  string email = 3;
  optional string phone_number = 4;
  string status = 5;
  bool is_active = 6;
  bool email_verified = 7;
  bool phone_verified = 8;
  optional string registration_date = 9;
  string created_at = 10;
  string updated_at = 11;
  optional OrganizationAddress address = 12;
  OrganizationMeta meta = 13;
  int32 revenue = 14;
  int32 transactions = 15;
}

message PaginationMeta {
  int32 total = 1;
  int32 current_page = 2;
  int32 page_size = 3;
  int32 total_pages = 4;
  optional int32 next_page = 5;
  optional int32 prev_page = 6;
}

message GetOrganizationsResponse {
  repeated OrganizationDetail organizations = 1;
  PaginationMeta meta = 2;
}enum DepartmentTypeEnum {
  KITCHEN = 0;
  RECEPTION = 1;
  HR = 2;
  LEGAL = 3;
  OPERATIONS = 4;
  CUSTOM = 5;
}

message DepartmentType {
  string department_type_id = 1;
  string company_id = 2;
  optional string branch_id = 3;
  string name = 4;
  optional string description = 5;
  DepartmentTypeEnum type = 6;
  string created_at = 7;
  string updated_at = 8;
  optional string deleted_at = 9;
}

message DepartmentWithType {
  string department_id = 1;
  string company_id = 2;
  optional string branch_id = 3;
  string name = 4;
  optional string description = 5;
  bool is_active = 6;
  optional string department_type_id = 7;
  string created_at = 8;
  string updated_at = 9;
  optional string deleted_at = 10;
  optional DepartmentType department_type = 11;
  repeated DepartmentRoleData department_roles = 12;
  optional Branch branch = 13;
}

// Slim user info embedded in staff department role assignments
message StaffUserInfo {
  string user_id = 1;
  string email = 2;
  optional string first_name = 3;
  optional string last_name = 4;
  optional string avatar_url = 5;
  optional string phone_number = 6;
  optional string username = 7;
}

// Full staff record mirroring profile-service Staff type
// Self-contained so organization.proto does not need to import profile.proto
message StaffData {
  string staff_id = 1;
  string company_id = 2;
  string user_id = 3;
  optional string branch_id = 4;
  string email = 5;
  optional string designation = 6;
  bool is_active = 7;
  string created_at = 8;
  string updated_at = 9;
  optional StaffUserInfo user = 10;
  optional string role_id = 11;
}

message DepartmentRoleData {
  string role_id = 1;
  string company_id = 2;
  string branch_id = 3;
  string department_id = 4;
  string name = 5;
  string slug = 6;
  optional string description = 7;
  bool is_active = 8;
  int32 level_number = 9;
  optional string reports_to = 10;
  repeated EntityPermission entity_permissions = 11;
  repeated StaffCompanyRoleData staff_company_roles = 12;
  optional DepartmentRoleData superior = 13;
  repeated DepartmentRoleData subordinates = 14;
  optional DepartmentWithType department = 15;
  string created_at = 16;
  string updated_at = 17;
  string organization_id = 18;
}

// ── Partners ────────────────────────────────────────────────────────────────

enum PartnerType {
  TENANT = 0;      // e.g. tenant in an estate or commercial property
  CONTRACTOR = 1;  // building / maintenance contractor
  VENDOR = 2;      // goods supplier
  FREELANCER = 3;  // project-based independent worker
  CONSULTANT = 4;  // advisory / professional services
  AGENT = 5;       // sales or letting agent
  OTHER = 6;       // catch-all
}

/// A single partner type entry returned by GetPartnerTypes.
message PartnerTypeData {
  int32 value = 1;       // Numeric enum value (matches PartnerType)
  string key = 2;        // Enum key string e.g. "TENANT"
  string label = 3;      // Human-readable label e.g. "Tenant"

}

message GetPartnerTypesResponse {
  bool success = 1;
  optional string error = 2;
  repeated PartnerTypeData partner_types = 3;
}

/// Full partner record.
message PartnerData {
  string partner_id = 1;
  string organization_id = 2;
  optional string company_id = 3;
  optional string profile_id = 4;   // Linked user in the Profile Service (optional)
  string first_name = 5;
  string last_name = 6;
  optional string email = 7;
  optional string phone_number = 8;
  optional string description = 9;
  bool is_active = 10;
  string created_at = 11;
  string updated_at = 12;
  optional string deleted_at = 13;
  optional string creator_id = 14;
  repeated PartnerCompanyRoleData partner_company_roles = 15;
}

message CreatePartnerRequest {
  string organization_id = 1;
  optional string company_id = 2;
  optional string profile_id = 3;   // Optionally tie to an existing user profile
  string first_name = 4;
  string last_name = 5;
  optional string email = 6;
  optional string phone_number = 7;
  optional string description = 8;
  string creator_id = 9;
}

message UpdatePartnerRequest {
  string partner_id = 1;
  string organization_id = 2;
  optional string company_id = 3;
  optional string profile_id = 4;
  optional string first_name = 5;
  optional string last_name = 6;
  optional string email = 7;
  optional string phone_number = 8;
  optional string description = 9;
  optional bool is_active = 10;
}

message GetPartnerRequest {
  string partner_id = 1;
  string organization_id = 2;
}

message GetPartnersRequest {
  string organization_id = 1;
  optional string company_id = 2;
  optional string role_id = 3;   // Filter partners assigned to a specific role
  optional bool is_active = 4;
  optional string search = 5;
  optional int32 page = 6;
  optional int32 page_size = 7;
}

message DeletePartnerRequest {
  string partner_id = 1;
  string organization_id = 2;
}

/// Mirrors StaffCompanyRoleData — one row per role assigned to a partner.
message PartnerCompanyRoleData {
  string partner_company_role_id = 1;
  string partner_id = 2;
  string company_role_id = 3;
  bool is_active = 4;
  optional OrganizationRole company_role = 5;
}

message AssignPartnerRoleRequest {
  string partner_id = 1;
  string role_id = 2;          // Must be an OrganizationRole with role_type = PARTNER_ROLE
  string organization_id = 3;
  string company_id = 4;
}

message RemovePartnerRoleRequest {
  string partner_id = 1;
  string role_id = 2;
  string organization_id = 3;
}

message PartnerResponse {
  bool success = 1;
  optional string error = 2;
  string message = 3;
  optional PartnerData partner = 4;
}

message GetPartnersResponse {
  bool success = 1;
  optional string error = 2;
  repeated PartnerData partners = 3;
  PaginationMeta meta = 4;
}

message GetCompanyRolePartnersResponse {
  bool success = 1;
  optional string error = 2;
  string role_id = 3;
  string role_name = 4;
  repeated PartnerData partners = 5;
}
