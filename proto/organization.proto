// 🏗️ DATA MODELS
message Organization {
  string organization_id = 1;
  string name = 2;
  string phone_number = 3;
  string email = 4;
  string registration_number = 5;
  string registration_date = 6;
  bool is_active = 7;
  bool is_multi_company = 8;
  string creator_id = 9;
  string created_at = 10;
  string updated_at = 11;
  optional string deleted_at = 12;
}

message Company {
  string company_id = 1;
  string organization_id = 2;
  string reference_id = 3;
  string email = 4;
  string name = 5;
  string registration_date = 6;
  bool   is_active = 7;
  string registration_number = 8;
  string company_logo = 9;
  string base_currency = 10;
  string country_code = 11;
  string phone_number = 12;
  string created_at = 13;
  string updated_at = 14;
  optional string deleted_at = 15;
  CompanyMetaData company_meta_data = 16;
  Branch main_branch = 17;
  repeated Branch branches = 18;
  PayrollBudgetLinkage payroll_budget_linkage = 19;
}


message CompanyMetaData {
  string company_id = 1;
  string staff_count = 2;
  string branch_count = 3;
  bool is_multi_branch = 4;
  int32 fiscal_year_start_month = 5;
  OperatingWeekday operating_week_starts_on = 6;
  CompanyOperationalPayFrequency default_payroll_frequency = 7;
  CompanyBudgetGranularity budget_reporting_granularity = 8;
  bool require_cost_center_on_budget_lines = 9;
  bool require_payroll_dimensions_on_run = 10;
  optional int64 petty_cash_approval_threshold_minor = 11;
}

message Branch {
  string branch_id = 1;
  string company_id = 2;
  string name = 3;
  string email = 4;
  string phone_number = 5;
  AddressRequest address = 6;
  bool is_main_branch = 7;
  bool is_active = 8;
  string created_at = 9;
  string updated_at = 10;
  optional string deleted_at = 11;
  optional string creator_id = 12;
  PayrollBudgetLinkage payroll_budget_linkage = 13;
}

message Department {
  string department_id = 1;
  string company_id = 2;
  optional string branch_id = 3;
  string name = 4;
  optional string description = 5;
  bool is_active = 6;
  string created_at = 7;
  string updated_at = 8;
  optional string deleted_at = 9;
}

