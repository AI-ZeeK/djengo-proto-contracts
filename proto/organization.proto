  int32 business_user_roles_count = 10;
  bool is_org_level = 11;
  string created_at = 12;
  string updated_at = 13;
  string deleted_at = 14;
  repeated BusinessUserRole business_user_roles = 15;
  repeated StaffCompanyRole staff_company_roles = 16;
  repeated PartnerCompanyRoleData partner_company_roles = 17;
  repeated EntityPermission entity_permissions = 18 ;
}


