syntax = "proto3";

package organization;

// 🏢 Organization Service - handles organization and branch management
service OrganizationService {
    // Branch Analytics
  rpc GetBranchesAnalytics(BranchesAnalyticsRequest) returns (BranchesAnalyticsResponse);

  // Organization Management
  rpc CreateOrganization(CreateOrganizationRequest) returns (OrganizationResponse);
  rpc GetOrganization(GetOrganizationRequest) returns (OrganizationResponse);

  // Validate Company Reference
  rpc ValidateCompanyReference(ValidateCompanyReferenceRequest) returns (ValidateCompanyReferenceResponse);
  
  // Verify IDs
  rpc VerifyCompanyId(VerifyCompanyIdRequest) returns (VerifyCompanyIdResponse);
  rpc VerifyBranchId(VerifyBranchIdRequest) returns (VerifyBranchIdResponse);
  rpc VerifyDepartmentId(VerifyDepartmentIdRequest) returns (VerifyDepartmentIdResponse);
  rpc VerifyRoleId(VerifyRoleIdRequest) returns (VerifyRoleIdResponse);

  // Create Company
  rpc CreateCompany(CreateCompanyRequest) returns (UtilitiesResponse);
  rpc FetchOrganizationCompanies(OrganizationIdRequest) returns (FetchCompaniesResponse);
  rpc FetchCompany(FetchCompanyRequest) returns (FetchCompanyResponse);
  rpc HandleMultiBranchCompanySetup(FetchCompanyRequest) returns (UtilitiesResponse);
  rpc UpdateCompanyDetails(UpdateCompanyDetailsRequest) returns (UtilitiesResponse);
  // Create Branch
  // rpc CreateBranch(CreateBranchRequest) returns (UtilitiesResponse);
  rpc FetchBranch(BranchIdRequest) returns (FetchBranchResponse);
  rpc FetchCompanyBranches(FetchCompanyRequest) returns (FetchBranchesResponse);
  // rpc UpdateBranch(UpdateBranchRequest) returns (UtilitiesResponse);
  // rpc DeleteBranch(BranchIdRequest) returns (UtilitiesResponse);



  // Utilities



  rpc FetchOrgRoles(OrganizationIdRequest) returns (FetchRolesResponse);
  rpc FetchOrgRole(OrganizationRoleIdRequest) returns (FetchRoleResponse);
  rpc CreateBusinessUserRole(CreateBusinessUserRoleRequest) returns (UtilitiesResponse);
  rpc UpdateBusinessUserRole(CreateBusinessUserRoleRequest) returns (UtilitiesResponse);

  rpc CreateRole(CreateRoleRequest) returns (UtilitiesResponse);
  rpc UpdateRole(UpdateRoleRequest) returns (UtilitiesResponse);
  rpc GetCompanyRoles(CompanyRolesRequest) returns (FetchRolesResponse);
  rpc GetCompanyRole(CompanyRoleRequest) returns (FetchRoleResponse);
  rpc GetCompanyRoleStaff(CompanyRoleRequest) returns (GetCompanyRoleStaffResponse);
  rpc GetCompanyRoleBusinessUsers(CompanyRoleRequest) returns (GetCompanyRoleBusinessUsersResponse);
  rpc GetCompanyRolePartners(CompanyRoleRequest) returns (GetCompanyRolePartnersResponse);

  // Analytics
  rpc GetOrganizationAnalytics(OrganizationAnalyticsRequest) returns (OrganizationAnalyticsResponse);
  rpc TotalOrganizations(EmptyRequest) returns (TotalOrganizationsResponse);
  rpc TopPerformingOrganizations(TopPerformingOrganizationsRequest) returns (TopPerformingOrganizationsResponse);

  rpc CreateDepartmentType(CreateDepartmentTypeRequest) returns (DepartmentTypeResponse);
  rpc UpdateDepartmentType(UpdateDepartmentTypeRequest) returns (DepartmentTypeResponse);
  rpc GetDepartmentTypes(GetDepartmentTypesRequest) returns (GetDepartmentTypesResponse);
  rpc GetDepartmentType(GetDepartmentTypeRequest) returns (DepartmentTypeResponse);
  rpc DeleteDepartmentType(DeleteDepartmentTypeRequest) returns (UtilitiesResponse);

  // Departments
  rpc CreateDepartment(CreateDepartmentRequest) returns (DepartmentResponse);
  rpc UpdateDepartment(UpdateDepartmentRequest) returns (DepartmentResponse);
  rpc GetDepartments(GetDepartmentsRequest) returns (GetDepartmentsResponse);
  rpc GetDepartment(GetDepartmentRequest) returns (DepartmentResponse);

  // Department Roles
  rpc CreateDepartmentRole(CreateDepartmentRoleRequest) returns (DepartmentRoleResponse);
  rpc UpdateDepartmentRole(UpdateDepartmentRoleRequest) returns (DepartmentRoleResponse);
  rpc GetDepartmentRoles(GetDepartmentRolesRequest) returns (GetDepartmentRolesResponse);
  rpc GetDepartmentRole(GetDepartmentRoleRequest) returns (DepartmentRoleResponse);
  rpc GetDepartmentRoleStaff(GetDepartmentRoleRequest) returns (GetDepartmentRoleStaffResponse);
  rpc AssignStaffDepartmentRole(AssignStaffDepartmentRoleRequest) returns (UtilitiesResponse);

  // Entity Permissions
  rpc GetDepartmentRolePermissions(GetEntityPermissionsRequest) returns (GetEntityPermissionsResponse);
  rpc GetStaffCompanyRolePermissions(GetEntityPermissionsRequest) returns (GetEntityPermissionsResponse);
  rpc GetBusinessUserRolePermissions(GetEntityPermissionsRequest) returns (GetEntityPermissionsResponse);
  rpc GetPartnerRolePermissions(GetEntityPermissionsRequest) returns (GetEntityPermissionsResponse);

  // Permission Group Catalogs
  rpc GetDepartmentPermissionGroups(EmptyRequest) returns (GetPermissionGroupsResponse);
  rpc GetStaffPermissionGroups(EmptyRequest) returns (GetPermissionGroupsResponse);
  rpc GetBusinessUserPermissionGroups(EmptyRequest) returns (GetPermissionGroupsResponse);
  rpc GetPartnerPermissionGroups(EmptyRequest) returns (GetPermissionGroupsResponse);

  // Partners
  rpc CreatePartner(CreatePartnerRequest) returns (PartnerResponse);
  rpc UpdatePartner(UpdatePartnerRequest) returns (PartnerResponse);
  rpc GetPartner(GetPartnerRequest) returns (PartnerResponse);
  rpc GetPartners(GetPartnersRequest) returns (GetPartnersResponse);
  rpc DeletePartner(DeletePartnerRequest) returns (UtilitiesResponse);
  rpc AssignPartnerRole(AssignPartnerRoleRequest) returns (UtilitiesResponse);
  rpc RemovePartnerRole(RemovePartnerRoleRequest) returns (UtilitiesResponse);
  rpc GetPartnerTypes(EmptyRequest) returns (GetPartnerTypesResponse);

  // Tables
  rpc GetOrganizations(GetOrganizationsRequest) returns (GetOrganizationsResponse);

  rpc GenerateEmployeeNumber(GenerateEmployeeNumberRequest) returns (GenerateEmployeeNumberResponse);

}

// ============================================================================
// HR — EMPLOYEE NUMBER
// ============================================================================

message GenerateEmployeeNumberRequest {
  string organization_id = 1;
  string prefix = 2; // e.g. "ACME"
}

message GenerateEmployeeNumberResponse {
  bool success = 1;
  optional string error = 2;
  optional string employee_number = 3; // e.g. "ACME-2025-0042"
}

/// Payroll vs budgeting control mode (company default; branch may override via `Branch.payroll_budget_linkage`).
enum PayrollBudgetLinkage {
  PAYROLL_BUDGET_LINKAGE_UNSPECIFIED = 0;
  FLEXIBLE = 1;
  PAYROLL_FORECAST_FEEDS_BUDGET = 2;
  BUDGET_HARD_CAP = 3;
  BUDGET_APPROVAL_GATE = 4;
}

/// First operational day-of-week — rosters, labor roll-ups (`CompanyMetaData` in org DB).
enum OperatingWeekday {
  OPERATING_WEEKDAY_UNSPECIFIED = 0;
  MONDAY = 1;
  TUESDAY = 2;
  WEDNESDAY = 3;
  THURSDAY = 4;
  FRIDAY = 5;
  SATURDAY = 6;
  SUNDAY = 7;
}

enum CompanyOperationalPayFrequency {
  COMPANY_OPERATIONAL_PAY_FREQUENCY_UNSPECIFIED = 0;
  OP_PAY_FREQ_NOT_SET = 1;
  OP_PAY_FREQ_WEEKLY = 2;
  OP_PAY_FREQ_BIWEEKLY = 3;
  OP_PAY_FREQ_SEMI_MONTHLY = 4;
  OP_PAY_FREQ_MONTHLY = 5;
}

enum CompanyBudgetGranularity {
  COMPANY_BUDGET_GRANULARITY_UNSPECIFIED = 0;
  BUDGET_MONTHLY = 1;
  BUDGET_QUARTERLY = 2;
  BUDGET_ANNUAL = 3;
}

  // Branch Analytics Messages
  message BranchesAnalyticsRequest {
    string company_id = 1;
    string organization_id = 2;
    string timeline = 3;
    optional string start_date = 4;
    optional string end_date = 5;
  }

  message ChartData {
    string name = 1;
    int32 value = 2;
  }

  message BranchesAnalyticsResponse {
    int32 amount = 1;
    double percentage = 2;
    string trend = 3;
    repeated ChartData chart_data = 4;
  }
message CompanyRoleRequest {
  string company_id = 1;
  string role_id = 2;
}
message CompanyRolesRequest {
  string company_id = 1;
  optional string branch_id = 2;
  RoleType role_type = 3;
}

message UpdateCompanyDetailsRequest {
  string company_id = 1;
  string name = 2;
  string phone_number = 3;
  string email = 4; 
  string registration_number = 5;
  string registration_date = 6;
  string country_code = 7;
  string company_logo = 8;
  string base_currency = 9;
  optional AddressRequest address = 10;
  PayrollBudgetLinkage payroll_budget_linkage = 11;
}

message OrganizationRoleIdRequest {
  string organization_role_slug = 1;
  string organization_id = 2;
}



message FetchCompanyRequest {
  string company_id = 1;
}


message FetchCompanyResponse {    
  bool success = 1;
  optional string error = 2;
  Company company = 3;
  string message = 4;
}
message FetchBranchResponse {    
  bool success = 1;
  optional string error = 2;
  Branch branch = 3;
  string message = 4;
}
message FetchBranchesResponse {      
  bool success = 1;
  optional string error = 2;
  repeated Branch branches = 3;
  string message = 4;
}


message FetchRolesResponse {
  bool success = 1;
  optional string error = 2;
  repeated OrganizationRole organization_roles = 3;
}

message FetchRoleResponse {
  bool success = 1;
  optional string error = 2;
  OrganizationRole organization_role = 3;
} 

message RoleData {
  OrganizationRole organization_role = 3;
}


message CreateBusinessUserRoleRequest {
  string organization_id = 1;
  string role_name = 2;
  string description = 3;
  repeated string business_user_ids = 4;
  repeated Permission permissions = 5;
  string creator_id = 6;
}
enum RoleType {
  STAFF_ROLE = 0;
  BUSINESS_USER_ROLE = 1;
  PARTNER_ROLE = 2;
}



message CreateRoleRequest {
  string organization_id = 1;
  string company_id = 2;
  string role_name = 3;
  string description = 4;
  repeated string staff_ids = 5;
  repeated string business_user_ids = 6;
  repeated string partner_ids = 7;
  repeated Permission permissions = 8;
  string creator_id = 9;
  RoleType role_type = 10;
  optional string branch_id = 11;
  optional PartnerType partner_type = 12;
}
message UpdateRoleRequest {
  string role_id = 1;
  string organization_id = 2;
  string company_id = 3;
  string role_name = 4;
  string description = 5;
  repeated string staff_ids = 6;
  repeated string business_user_ids = 7;
  repeated string partner_ids = 8;
  repeated Permission permissions = 9;
  string creator_id = 10;
  RoleType role_type = 11;
  optional string branch_id = 12;
  optional PartnerType partner_type = 13;
}

message Permission {
  string permission_name = 1;
  bool state = 2;
}

