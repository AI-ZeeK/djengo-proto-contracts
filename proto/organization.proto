}

  message PermissionResponse {
  string permission_id = 1;
  string permission_name = 2;
  string description = 3;
  int32 level = 4;
  string created_at = 5;
  string updated_at = 6;
}

message OrganizationRole {
  string role_id = 1;
  string organization_id = 2;
  string company_id = 3;
  string branch_id = 4;
  string name = 5;
  string slug = 6;
  string partner_type = 7;
  string description = 8;
