syntax = "proto3";

option csharp_namespace = "Operations.Grpc";

package operations;

// The greeting service definition.
service OperationService {
  // Sends a greeting
  rpc SayHello (HelloRequest) returns (HelloReply);
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);

  // Company Services Management
  rpc CreateCompanyServices(CreateCompanyServicesRequest) returns (CreateCompanyServicesResponse);
  rpc UpdateCompanyServiceStatus(UpdateCompanyServiceStatusRequest) returns (UpdateCompanyServiceResponse);
  rpc UpdateCompanyService(UpdateCompanyServiceRequest) returns (UpdateCompanyServiceResponse);
  rpc DeleteCompanyService(DeleteCompanyServiceRequest) returns (DeleteCompanyServiceResponse);
  rpc GetCompanyServices(GetCompanyServicesRequest) returns (GetCompanyServicesResponse);
  rpc GetCompanyService(GetCompanyServiceRequest) returns (GetCompanyServiceResponse);
  rpc SearchCompanyServices(SearchCompanyServicesRequest) returns (GetCompanyServicesResponse);
  rpc CreateServiceBranch(CreateServiceBranchRequest) returns (CreateServiceBranchResponse);
  rpc UpsertBusinessHours(UpsertBusinessHoursRequest) returns (UpsertBusinessHoursResponse);

    // Countries Management
    
    // Service Types Management
  rpc GetServiceTypes(EmptyRequest) returns (GetServiceTypesResponse);
  rpc CreateServiceType(CreateServiceTypeRequest) returns (CreateServiceTypeResponse);
  rpc UpdateServiceType(UpdateServiceTypeRequest) returns (CreateServiceTypeResponse);

    // Business Types Management
  rpc GetAdminBusinessTypes(EmptyRequest) returns (GetBusinessTypesResponse);
  rpc GetBusinessType(BusinessTypeIdRequest) returns (GetBusinessTypeResponse);
  rpc GetBusinessTypes(EmptyRequest) returns (GetBusinessTypesResponse);
  rpc CreateBusinessType(CreateBusinessTypeRequest) returns (CreateBusinessTypeResponse);
  rpc UpdateAdminBusinessType(UpdateBusinessTypeRequest) returns (UtilitiesResponse);
  rpc UpdateBusinessTypeActiveStatus(UpdateBusinessTypeActiveStatusRequest) returns (UpdateBusinessTypeActiveStatusResponse);


  rpc FetchServiceTypes(EmptyRequest) returns (GetServiceTypesResponse);
  rpc GetTableLocations(OrganizationIdRequest) returns (GetTableLocationsResponse);
  rpc GetBedSizes(OrganizationIdRequest) returns (GetBedSizesResponse);
  rpc GetRoomLocations(OrganizationIdRequest) returns (GetRoomLocationsResponse);


    //Delete Utilities
  rpc DeleteTableLocation(DeleteTableLocationRequest) returns (UtilitiesResponse);
  rpc DeleteBedSize(DeleteBedSizeRequest) returns (UtilitiesResponse);
  rpc DeleteRoomLocation(DeleteRoomLocationRequest) returns (UtilitiesResponse);

  // CREATE UTILITIES
  rpc CreateTableLocation(CreateTableLocationRequest) returns (UtilitiesResponse);
  rpc CreateBedSize(CreateBedSizeRequest) returns (UtilitiesResponse);
  rpc CreateRoomLocation(CreateRoomLocationRequest) returns (UtilitiesResponse);
}
message EmptyRequest {}


message CreateServiceTypeRequest {
  string name = 1;
// e.g., RESTAURANT, HOTEL, SPA, GYM, etc.
}

message CreateServiceTypeResponse {
  bool success = 1;
  string message = 2;
  optional ServiceType data = 3;
}

message UpdateServiceTypeRequest {
  string service_type_id = 1;
  string name = 2;
}

// The request message containing the user's name.
message HelloRequest {
  string name = 1;
}

// The response message containing the greetings.
message HelloReply {
  string message = 1;
}

message HealthCheckRequest {}
message HealthCheckResponse {
  string status = 1;
}

message BusinessTypeIdRequest{
   string business_type_id = 1;
}


// --- Company Services Creation ---
message CreateCompanyServicesRequest {
  string company_id = 1;
  int32 business_type_id = 2;
  string name = 3;
  string base_price = 4;
  string description = 5;
  bool is_active = 6;
  optional string branch_id = 7;
  repeated BusinessTypeRequest business_types = 8;
}

message CreateCompanyServicesResponse {
  string message = 1;
  bool success = 2;
  optional CompanyServiceData data = 3;
}

// --- Update Company Service ---
message UpdateCompanyServiceStatusRequest {
  string company_service_id = 1;
  optional bool is_active = 2;
}
message UpdateCompanyServiceRequest {
  string company_service_id = 1;
  optional int32 business_type_id = 2;
  optional string name = 3;
  optional string base_price = 4;
  optional string description = 5;
  optional bool is_active = 6;
}

message UpdateCompanyServiceResponse {
  bool success = 1;
  string message = 2;
  optional CompanyServiceData data = 3;
}

// --- Delete Company Service (Soft Delete) ---
message DeleteCompanyServiceRequest {
  string company_service_id = 1;
}

message DeleteCompanyServiceResponse {
  bool success = 1;
  string message = 2;
}

// --- Get Company Services ---
message GetCompanyServicesRequest {
  string company_id = 1;
  optional string branch_id = 2;
  optional bool include_inactive = 3;
}
// --- Get Company Services ---
message GetCompanyServiceRequest {
  string company_service_id = 1;
}

// --- Search Company Services with Filters ---
message SearchCompanyServicesRequest {
  optional string company_id = 1; // Optional - filter by company, if not provided returns all companies
  optional string service_name = 2; // Filter by service/business type name
  optional int32 business_type_id = 3; // Filter by business type ID
  optional bool include_inactive = 4; // Include inactive services
  optional string branch_id = 5; // Filter by branch
  optional bool include_deleted = 6; // Include soft-deleted services (default: false)
}

message GetCompanyServiceResponse  {
  bool success = 1;
  optional string error = 2;
  string message = 3;
  CompanyServiceData company_service = 4;
}
message GetCompanyServicesResponse {
  bool success = 1;
  optional string error = 2;
  string message = 3;
  repeated CompanyServiceData company_services = 4;
}





message CompanyServiceData {
  string company_service_id = 1;
  string company_id = 2;
  int32 business_type_id = 3;
  string name = 4;
  string price = 5;
  string description = 6;
  bool is_active = 7;
  optional string branch_id = 8;
  string created_at = 9;
  string updated_at = 10;
  optional BusinessType business_type = 11;
  repeated ServiceBranch service_branches = 12;
}

message BusinessTypeRequest {
  string type = 1; // RESTAURANT, HOTEL, SPA, GYM, etc.
  string description = 2;
  string check_in_time = 3;
  string check_out_time = 4;
  repeated BusinessHourRequest business_hours = 5;
  repeated RestaurantTableTypeRequest restaurant_table_types = 6;
  repeated HotelRoomTypeRequest hotel_room_types = 7;
}

message BusinessHourRequest {
  string day_of_week = 1; // MONDAY, TUESDAY, etc.
  string start_time = 2;
  string end_time = 3;
}

message RestaurantTableTypeRequest {
  string name = 1;
  int32 seating_capacity = 2;
  string description = 3;
  repeated RestaurantTableRequest tables = 4;
}

message RestaurantTableRequest {
  string name = 1;
  int32 location_id = 2;
  string description = 3;
}

message OrganizationIdRequest {
  string organization_id = 1;
}

message HotelRoomTypeRequest {
  string name = 1;
  string description = 2;
  double price_per_night = 3;
  int32 max_occupancy = 4;
  int32 bed_size_id = 5;
  repeated HotelRoomRequest hotel_rooms = 6;
}

message HotelRoomRequest {
  string ref = 1;
  int32 location_id = 2;
  string description = 3;
  bool is_active = 4;
}

// --- Service Branch Creation ---
message CreateServiceBranchRequest {
  string branch_id = 1;
  string service_id = 2;
  string service_type_name = 3;
  string description = 4;
  string check_in_time = 5;
  string check_out_time = 6;
}

message CreateServiceBranchResponse {
  string service_branch_id = 1;
}

message CreateTableLocationRequest {
  string name = 1;
  string organization_id = 2;
  string creator_id = 3;
}

message CreateBedSizeRequest {
  string name = 1;
  string organization_id = 2;
  string creator_id = 3;
}

message CreateRoomLocationRequest {
  string name = 1;
  string organization_id = 2;
  string creator_id = 3;
}

// --- Business Hours Upsert ---
message UpsertBusinessHoursRequest {
  string service_branch_id = 1;
  string business_day = 2;
  string start_time = 3;
  string end_time = 4;
}

message UpsertBusinessHoursResponse {
  string business_hours_id = 1;
}

message ServiceType {
  string service_type_id = 1;
  string name = 2;
}

message GetServiceTypesResponse {
  bool success = 1;
  optional string error = 2;
  repeated ServiceType service_types = 3;
}

// Business Types Messages
message CreateBusinessTypeRequest {
  string name = 1;
  string description = 2;
  bool is_active = 3;
}

message CreateBusinessTypeResponse {
  bool success = 1;
  string message = 2;
  optional BusinessTypeData data = 3;
}

message UpdateBusinessTypeRequest {
  int32 business_type_id = 1;
   string name = 2;
  string description = 3;
  bool is_active = 4;
}
message UpdateBusinessTypeActiveStatusRequest {
  int32 business_type_id = 1;
}

message UpdateBusinessTypeActiveStatusResponse {
  bool success = 1;
  string message = 2;
  optional BusinessTypeData data = 3;
}

message GetBusinessTypesResponse {
  bool success = 1;
  optional string error = 2;
  repeated BusinessTypeData business_types = 3;
}
message GetBusinessTypeResponse {
  bool success = 1;
  optional string error = 2;
  BusinessTypeData business_type = 3;
}

message BusinessTypeData {
  int32 business_type_id = 1;
  string name = 2;
  string description = 3;
  bool is_active = 4;
  string created_at = 5;
  string updated_at = 6;
}

message GetBedSizesResponse {
  bool success = 1;
  optional string error = 2;
  repeated BedSize bed_sizes = 3;
}



message DeleteTableLocationRequest {
  int32 table_location_id = 1;
} 

message DeleteBedSizeRequest {
  int32 bed_size_id = 1;
}

message DeleteRoomLocationRequest {
  int32 room_location_id = 1;
}

message GetTableLocationsResponse {
  bool success = 1;
  optional string error = 2;
  repeated TableLocation table_locations = 3;
}

message GetRoomLocationsResponse {
  bool success = 1;
  optional string error = 2;
  repeated RoomLocation room_locations = 3;
}

message UtilitiesResponse {
  bool success = 1;
  optional string error = 2;
  string message = 3;
}

message TableLocation {
  int32 table_location_id = 1;
  string name = 2;
  string description = 3;
  bool is_global = 4;
  bool is_active = 5;
}

message RoomLocation {
  int32 room_location_id = 1;
  string name = 2;
  string description = 3;
  bool is_global = 4;
  bool is_active = 5;
}

message HotelRoomType {
  string name = 1;
  optional string description = 2;
  int32 price_per_night = 3;
  int32 max_occupancy = 4;
  int32 bed_size_id = 5;
  repeated HotelRoom hotel_rooms = 6;
}

message HotelRoom {
  string ref = 1;
  optional string description = 2;
  int32 location_id = 3;
  optional bool is_active = 4;

}



message BedSize {
  int32 bed_size_id = 1;
  string name = 2;
  string description = 3;
  bool is_global = 4;
  bool is_active = 5;
}
message BusinessType {
  int32 business_type_id = 1;
  string name = 2;
  string description = 3;
  bool is_active = 4;
}
message ServiceBranch{
  string service_branch_id = 1;
  string branch_id = 2;
  string service_id = 3;
  string service_type_name = 4;
  string description = 5;
  string check_in_time = 6;
  string check_out_time = 7;
  repeated BusinessHours business_hours = 8;
  repeated RestaurantTableType restaurant_table_types = 9;
  repeated HotelRoomType hotel_room_types = 10;

}


message BusinessHours {
  string day_of_week = 1;
  string start_time = 2;
  string end_time = 3;
  bool is_active = 4;
}

message RestaurantTableType {
  optional string name = 1;
  optional string description = 2;
  optional int32 seating_capacity = 3;
  repeated RestaurantTable tables = 4;
}

message RestaurantTable {
  optional string name = 1;
  optional string description = 2;
  optional int32 location_id = 3;
}

// ── Orders ─────────────────────────────────────────────────────────────────

service OrderService {
  rpc PlaceOrder          (PlaceOrderRequest)          returns (OrderProto);
  rpc GetOrder            (GetOrderRequest)            returns (OrderProto);
  rpc ListOrders          (ListOrdersRequest)          returns (ListOrdersResponse);
  rpc UpdateOrderStatus   (UpdateOrderStatusRequest)   returns (OrderProto);
  rpc CancelOrder         (CancelOrderRequest)         returns (OrderProto);
}

message OrderItemProto {
  string order_item_id     = 1;
  string order_id          = 2;
  string catalog_item_id   = 3;
  string name_snapshot     = 4;
  int32  quantity          = 5;
  int64  unit_price_minor  = 6;
  int64  total_minor       = 7;
  optional string special_instructions = 8;
}

message OrderProto {
  string order_id           = 1;
  string company_id         = 2;
  string organization_id    = 3;
  string source_id          = 4;
  string source_type        = 5; // RESTAURANT | HOTEL | SPA | GYM | BAR | ROOM_SERVICE | OTHER
  optional string destination_ref = 6;
  optional string guest_id  = 7;
  string order_number       = 8;
  string order_type         = 9; // DINE_IN | TAKEAWAY | ROOM_SERVICE | DELIVERY
  string status             = 10; // PENDING | CONFIRMED | PREPARING | READY | SERVED | CANCELLED | REFUNDED
  int64  subtotal_minor     = 11;
  int64  tax_minor          = 12;
  int64  discount_minor     = 13;
  int64  total_minor        = 14;
  string currency_code      = 15;
  optional string special_instructions = 16;
  string placed_by          = 17;
  string placed_at          = 18;
  optional string confirmed_at = 19;
  optional string served_at = 20;
  repeated OrderItemProto items = 21;
  string created_at         = 22;
  string updated_at         = 23;
}

message PlaceOrderRequest {
  string company_id         = 1;
  string organization_id    = 2;
  string source_id          = 3;
  string source_type        = 4;
  optional string destination_ref = 5;
  optional string guest_id  = 6;
  string order_type         = 7;
  string currency_code      = 8;
  optional string special_instructions = 9;
  string placed_by          = 10;
  repeated OrderItemProto items = 11;
}

message GetOrderRequest           { string order_id = 1; }
message CancelOrderRequest        { string order_id = 1; string cancelled_by = 2; optional string reason = 3; }

message UpdateOrderStatusRequest {
  string order_id    = 1;
  string status      = 2;
  string updated_by  = 3;
}

message ListOrdersRequest {
  string company_id         = 1;
  string organization_id    = 2;
  optional string source_id = 3;
  optional string source_type = 4;
  optional string status    = 5;
  optional string guest_id  = 6;
  optional string search    = 7;
  optional int32  page      = 8;
  optional int32  page_size = 9;
}

message ListOrdersResponse {
  repeated OrderProto orders = 1;
  TableMeta meta             = 2;
}

// ── Kitchen Tickets ────────────────────────────────────────────────────────

service KitchenService {
  rpc ListKitchenTickets          (ListKitchenTicketsRequest)         returns (ListKitchenTicketsResponse);
  rpc GetKitchenTicket            (GetKitchenTicketRequest)           returns (KitchenTicketProto);
  rpc UpdateKitchenTicketStatus   (UpdateKitchenTicketStatusRequest)  returns (KitchenTicketProto);
  rpc AssignKitchenTicket         (AssignKitchenTicketRequest)        returns (KitchenTicketProto);
}

message KitchenTicketProto {
  string ticket_id       = 1;
  string order_id        = 2;
  string company_id      = 3;
  string organization_id = 4;
  string station         = 5; // MAIN | BAR | PASTRY | GRILL | COLD | OTHER
  string status          = 6; // QUEUED | IN_PROGRESS | READY | DELIVERED | CANCELLED
  optional string assigned_to = 7;
  int32  priority        = 8;
  optional string started_at   = 9;
  optional string ready_at     = 10;
  optional string delivered_at = 11;
  optional string notes  = 12;
  string created_at      = 13;
  string updated_at      = 14;
}

message GetKitchenTicketRequest { string ticket_id = 1; }

message UpdateKitchenTicketStatusRequest {
  string ticket_id   = 1;
  string status      = 2;
  string updated_by  = 3;
}

message AssignKitchenTicketRequest {
  string ticket_id   = 1;
  string assigned_to = 2;
}

message ListKitchenTicketsRequest {
  string company_id         = 1;
  string organization_id    = 2;
  optional string station   = 3;
  optional string status    = 4;
  optional string order_id  = 5;
  optional int32  page      = 6;
  optional int32  page_size = 7;
}

message ListKitchenTicketsResponse {
  repeated KitchenTicketProto tickets = 1;
  TableMeta meta                      = 2;
}

// ── Guest Feedback ─────────────────────────────────────────────────────────

service GuestFeedbackService {
  rpc SubmitFeedback  (SubmitFeedbackRequest)  returns (GuestFeedbackProto);
  rpc GetFeedback     (GetFeedbackRequest)     returns (GuestFeedbackProto);
  rpc ListFeedback    (ListFeedbackRequest)    returns (ListFeedbackResponse);
  rpc RespondToFeedback (RespondToFeedbackRequest) returns (GuestFeedbackProto);
}

message GuestFeedbackProto {
  string feedback_id      = 1;
  optional string guest_id = 2;
  string company_id       = 3;
  string organization_id  = 4;
  optional string reservation_id = 5;
  optional string order_id = 6;
  int32  overall_rating   = 7;
  optional int32 service_rating    = 8;
  optional int32 cleanliness_rating = 9;
  optional int32 value_rating      = 10;
  optional string comment = 11;
  string category         = 12; // GENERAL | ROOM | FOOD | SERVICE | CLEANLINESS | FACILITIES | VALUE | COMPLAINT
  bool   is_public        = 13;
  optional string response = 14;
  optional string responded_by = 15;
  optional string responded_at = 16;
  string created_at       = 17;
  string updated_at       = 18;
}

message SubmitFeedbackRequest {
  optional string guest_id = 1;
  string company_id        = 2;
  string organization_id   = 3;
  optional string reservation_id = 4;
  optional string order_id = 5;
  int32  overall_rating    = 6;
  optional int32 service_rating    = 7;
  optional int32 cleanliness_rating = 8;
  optional int32 value_rating      = 9;
  optional string comment  = 10;
  string category          = 11;
  bool   is_public         = 12;
}

message GetFeedbackRequest { string feedback_id = 1; }

message RespondToFeedbackRequest {
  string feedback_id   = 1;
  string response      = 2;
  string responded_by  = 3;
}

message ListFeedbackRequest {
  string company_id         = 1;
  string organization_id    = 2;
  optional string guest_id  = 3;
  optional string category  = 4;
  optional int32  page      = 5;
  optional int32  page_size = 6;
}

message ListFeedbackResponse {
  repeated GuestFeedbackProto feedback = 1;
  TableMeta meta                       = 2;
}

message TableMeta {
  int32 total       = 1;
  int32 current_page = 2;
  int32 page_size   = 3;
  int32 total_pages = 4;
  int32 next_page   = 5;
  int32 prev_page   = 6;
}