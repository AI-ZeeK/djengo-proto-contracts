syntax = "proto3";

option csharp_namespace = "Facility.Grpc";

package facility;

import "google/protobuf/empty.proto";

service FacilityService {
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);

  rpc GetCompanyFacilityProfile(GetCompanyFacilityProfileRequest) returns (CompanyFacilityProfileResponse);
  rpc UpsertCompanyFacilityProfile(UpsertCompanyFacilityProfileRequest) returns (CompanyFacilityProfileResponse);

  rpc GetFacilityTree(GetFacilityTreeRequest) returns (GetFacilityTreeResponse);
  rpc SearchFacilityNodesByCode(SearchFacilityNodesByCodeRequest) returns (SearchFacilityNodesByCodeResponse);
  rpc GetFacilityNode(GetFacilityNodeRequest) returns (FacilityNodeResponse);
  rpc CreateFacilityNode(CreateFacilityNodeRequest) returns (FacilityNodeResponse);
  rpc UpdateFacilityNode(UpdateFacilityNodeRequest) returns (FacilityNodeResponse);
  rpc DeactivateFacilityNode(DeactivateFacilityNodeRequest) returns (FacilityNodeResponse);
  rpc GetAllowedChildNodeTypes(GetAllowedChildNodeTypesRequest) returns (GetAllowedChildNodeTypesResponse);
  rpc HasAnyFacilityNodes(HasAnyFacilityNodesRequest) returns (HasAnyFacilityNodesResponse);
  rpc GetCompanyFacilitySiteOperations(GetCompanyFacilitySiteOperationsRequest) returns (GetCompanyFacilitySiteOperationsResponse);
  rpc GetBranchFacilitySetupStatus(GetBranchFacilitySetupStatusRequest) returns (GetBranchFacilitySetupStatusResponse);
  rpc ListBranchOperations(ListBranchOperationsRequest) returns (ListBranchOperationsResponse);

  rpc GetFacilityNodeLevels(GetFacilityNodeLevelsRequest) returns (GetFacilityNodeLevelsResponse);
  rpc UpsertFacilityNodeLevels(UpsertFacilityNodeLevelsRequest) returns (UpsertFacilityNodeLevelsResponse);
  rpc DeleteFacilityNodeLevels(GetFacilityNodeLevelsRequest) returns (DeleteFacilityNodeLevelsResponse);

  rpc ListFacilityNodeTypes(google.protobuf.Empty) returns (ListFacilityNodeTypesResponse);

  rpc ListFacilityBulkTemplates(ListFacilityBulkTemplatesRequest) returns (ListFacilityBulkTemplatesResponse);
  rpc StartFacilityBulkCreate(StartFacilityBulkCreateRequest) returns (StartFacilityBulkCreateResponse);

  rpc CreateOccupancyStay(CreateOccupancyStayRequest) returns (OccupancyStayResponse);
  rpc EndOccupancyStay(EndOccupancyStayRequest) returns (OccupancyStayResponse);
  rpc EvacuateOccupancyStay(EvacuateOccupancyStayRequest) returns (OccupancyStayResponse);
  rpc GetActiveOccupancyStay(GetActiveOccupancyStayRequest) returns (OccupancyStayResponse);
  rpc ListOccupancyStays(ListOccupancyStaysRequest) returns (ListOccupancyStaysResponse);
  rpc ListNodeOccupancyStayHistory(ListNodeOccupancyStayHistoryRequest) returns (ListNodeOccupancyStayHistoryResponse);
  rpc ListHospitalReception(ListHospitalReceptionRequest) returns (ListHospitalReceptionResponse);
  rpc GetFacilityReceptionAnalytics(GetFacilityReceptionAnalyticsRequest) returns (GetFacilityReceptionAnalyticsResponse);
  rpc GetFacilityReceptionDetail(GetFacilityReceptionDetailRequest) returns (GetFacilityReceptionDetailResponse);
  rpc HasUserPriorOccupancyAtCompany(HasUserPriorOccupancyAtCompanyRequest) returns (HasUserPriorOccupancyAtCompanyResponse);

  rpc ListFacilityAssetTypeTemplates(ListFacilityAssetTypeTemplatesRequest) returns (ListFacilityAssetTypeTemplatesResponse);
  rpc UpsertFacilityAssetTypeTemplate(UpsertFacilityAssetTypeTemplateRequest) returns (UpsertFacilityAssetTypeTemplateResponse);
  rpc DeleteFacilityAssetTypeTemplate(DeleteFacilityAssetTypeTemplateRequest) returns (DeleteFacilityAssetTypeTemplateResponse);

  // Public guest browse — branches that opted into public listing (no auth).
  rpc SearchPublicFacilityListings(SearchPublicFacilityListingsRequest) returns (SearchPublicFacilityListingsResponse);
}



enum FacilityMode {
  FACILITY_MODE_UNSPECIFIED = 0;
  GENERAL = 1;
  HOSPITAL = 2;
  ESTATE = 3;
  HOSPITALITY = 4;
  RESTAURANT = 5;
}

enum FacilityNodeType {
  FACILITY_NODE_TYPE_UNSPECIFIED = 0;
  BLOCK = 1;
  BUILDING = 2;
  WARD = 3;
  UNIT = 4;
  ROOM = 5;
  BED = 6;
  FLOOR = 7;
  WING = 8;
  HOUSE = 9;
  TABLE = 10;
  ZONE = 11;
  SECTION = 12;
  SITE = 13;
}

enum SpatialOrientation {
  SPATIAL_ORIENTATION_UNSPECIFIED = 0;
  NORTH = 1;
  EAST = 2;
  SOUTH = 3;
  WEST = 4;
}

enum FacilityAssetKind {
  FACILITY_ASSET_KIND_UNSPECIFIED = 0;
  ASSET_KIND_BED = 1;
  ASSET_KIND_ROOM = 2;
  ASSET_KIND_TABLE = 3;
  ASSET_KIND_HOUSE = 4;
  ASSET_KIND_UNIT = 5;
  ASSET_KIND_SECTION = 6;
}

enum FacilityStatus {
  FACILITY_STATUS_UNSPECIFIED = 0;
  AVAILABLE = 1;
  MAINTENANCE = 2;
  TEMPORARILY_OUT_OF_COMMISSION = 3;
  OUT_OF_SERVICE = 4;
  RESERVED = 5;
}

message FacilityNodeTypeMessage {
  string             slug         = 1; // e.g. "annual"
  string             display_name = 2; // e.g. "Annual Leave"
  FacilityNodeType          type         = 3;
}
  
message  ListFacilityNodeTypesResponse {
  repeated FacilityNodeTypeMessage node_types = 1;

}

message GetFacilityNodeLevelsRequest {
  string company_id = 1;
  string organization_id = 2;
  string branch_id = 3;
}

message GetFacilityNodeLevelsResponse {
  bool success = 1;
  optional string error = 2;
  repeated FacilityNodeLevelMessage levels = 3;
}

message HealthCheckRequest {}

message HealthCheckResponse {
  bool success = 1;
  string message = 2;
}

message CompanyFacilityProfileMessage {
  string company_id = 1;
  string organization_id = 2;
  string facility_mode = 3;
  optional string metadata_json = 4;
  optional string layout_settings_json = 5;
  string branch_id = 6;
}

message GetCompanyFacilityProfileRequest {
  string company_id = 1;
  string organization_id = 2;
  string branch_id = 3;
}

message UpsertCompanyFacilityProfileRequest {
  string company_id = 1;
  string organization_id = 2;
  FacilityMode facility_mode = 3;
  optional string metadata_json = 4;
  string branch_id = 5;
}

message CompanyFacilityProfileResponse {
  bool success = 1;
  optional string error = 2;
  optional CompanyFacilityProfileMessage profile = 3;
}

message FacilityNodeLevelUpsertMessage {
  FacilityNodeType node_type = 1;
  int32 level_number = 2;
  reserved 3, 4; // removed: name, description (labels come from node_type)
  optional string color = 5;
  bool is_active = 6;
}

message FacilityNodeLevelMessage {
  string facility_node_level_id = 1;
  string organization_id = 2;
  string company_id = 3;
  string branch_id = 4;
  string node_type = 5;
  reserved 6, 7; // removed: name, description
  int32 level_number = 8;
  optional string color = 9;
  bool is_active = 10;
  string created_at = 11;
  string updated_at = 12;
  optional string deleted_at = 13;
}

message UpsertFacilityNodeLevelsRequest {
  string company_id = 1;
  string organization_id = 2;
  string branch_id = 3;
  repeated FacilityNodeLevelUpsertMessage levels = 4;
}

message UpsertFacilityNodeLevelsResponse {
  bool success = 1;
  optional string error = 2;
  repeated FacilityNodeLevelMessage levels = 3;
}

message DeleteFacilityNodeLevelsRequest {
  string company_id = 1;
  string organization_id = 2;
  string branch_id = 3;
  repeated FacilityNodeType node_types = 4;
}

message DeleteFacilityNodeLevelsResponse {
  bool success = 1;
  optional string error = 2;
  repeated FacilityNodeLevelMessage levels = 3;
}

message FacilityNodeMessage {
  string facility_node_id = 1;
  string organization_id = 2;
  string company_id = 3;
  string branch_id = 4;
  optional string parent_facility_node_id = 5;
  optional string code = 6;
  string name = 7;
  bool is_active = 8;
  // Extensible JSON: description, space { area_sq_m, length_m, width_m, height_m, ... } (metres).
  optional string metadata_json = 9;
  repeated FacilityNodeMessage children = 10;
  int32 child_count = 11;
  optional FacilityStatus status = 12;
  optional string node_level_id = 13;
  optional FacilityNodeLevelMessage node_level = 14;
  optional string description = 15;
  optional SpatialOrientation orientation = 16;
  optional string spatial_position_json = 17;
  int32 sort_order = 18;
  optional FacilityNodeAssetMessage asset = 19;
}

message FacilityNodeAssetMessage {
  string facility_node_id = 1;
  FacilityAssetKind asset_kind = 2;
  int32 capacity_max = 3;
  optional string metadata_json = 4;
}

// Occupancy profile when creating/updating occupiable nodes (bed, room, table, …).
message FacilityNodeAssetSetupMessage {
  // Override inferred kind from node_type; omit to infer from level.
  optional FacilityAssetKind asset_kind = 1;
  // Max occupants (tenants, patients, seats). 0 = use branch/mode defaults.
  int32 capacity_max = 2;
  optional string metadata_json = 3;
}

message GetFacilityTreeRequest {
  string branch_id = 1;
  string company_id = 2;
  string organization_id = 3;
  bool include_inactive = 4;
  bool shallow = 5;
  optional string parent_facility_node_id = 6;
}

message GetFacilityTreeResponse {
  bool success = 1;
  optional string error = 2;
  repeated FacilityNodeMessage nodes = 3;
}

message FacilityNodePathSegment {
  string facility_node_id = 1;
  string name = 2;
  string code = 3;
  optional string node_type = 4;
}

message FacilityNodeSearchMatch {
  FacilityNodeMessage node = 1;
  repeated FacilityNodePathSegment ancestors = 2;
}

message SearchFacilityNodesByCodeRequest {
  string branch_id = 1;
  string company_id = 2;
  string organization_id = 3;
  string code = 4;
  bool include_inactive = 5;
  int32 limit = 6;
}

message SearchFacilityNodesByCodeResponse {
  bool success = 1;
  optional string error = 2;
  repeated FacilityNodeSearchMatch matches = 3;
}

message GetFacilityNodeRequest {
  string facility_node_id = 1;
  string company_id = 2;
  string organization_id = 3;
}

message CreateFacilityNodeRequest {
  string organization_id = 1;
  string company_id = 2;
  string branch_id = 3;
  optional string parent_facility_node_id = 4;
  string name = 6;
  optional string description = 7;
  // Extensible JSON: description, space { area_sq_m, length_m, width_m, height_m, ... } (metres).
  optional string metadata_json = 9;
  optional FacilityStatus status = 10;
  optional string node_level_id = 11;
  optional SpatialOrientation orientation = 12;
  optional string spatial_position_json = 13;
  optional int32 sort_order = 14;
  optional FacilityNodeAssetSetupMessage asset_setup = 15;
}

message UpdateFacilityNodeRequest {
  string facility_node_id = 1;
  string company_id = 2;
  string organization_id = 3;
  optional string code = 4;
  optional string name = 5;
  optional string metadata_json = 6;
  optional bool is_active = 7;
  optional FacilityStatus status = 8;
  optional string description = 9;
  optional SpatialOrientation orientation = 10;
  optional string spatial_position_json = 11;
  optional int32 sort_order = 12;
  optional FacilityNodeAssetSetupMessage asset_setup = 13;
}

message DeactivateFacilityNodeRequest {
  string facility_node_id = 1;
  string company_id = 2;
  string organization_id = 3;
}

message FacilityNodeResponse {
  bool success = 1;
  optional string error = 2;
  optional FacilityNodeMessage node = 3;
}

message GetAllowedChildNodeTypesRequest {
  string company_id = 1;
  string organization_id = 2;
  // Empty / omitted = root level (lowest level_number).
  optional string parent_node_level_id = 3;
  string branch_id = 4;
}

message GetAllowedChildNodeTypesResponse {
  bool success = 1;
  optional string error = 2;
  repeated FacilityNodeLevelMessage levels = 3;
}

message HasAnyFacilityNodesRequest {
  string company_id = 1;
  string organization_id = 2;
}

message HasAnyFacilityNodesResponse {
  bool success = 1;
  optional string error = 2;
  bool has_any_nodes = 3;
  int32 node_count = 4;
}

message FacilitySiteOperationMessage {
  string key = 1;
  string label = 2;
  int32 location_count = 3;
  string source = 4;
}

message GetCompanyFacilitySiteOperationsRequest {
  string company_id = 1;
  string organization_id = 2;
  optional string branch_id = 3;
}

message GetCompanyFacilitySiteOperationsResponse {
  bool success = 1;
  optional string error = 2;
  repeated FacilitySiteOperationMessage operations = 3;
}

message BranchOperationMessage {
  string branch_operation_id = 1;
  string branch_id           = 2;
  string operation_kind      = 3;
  string display_name        = 4;
  string status              = 5;
  optional string site_node_id = 6;
}

message ListBranchOperationsRequest {
  string company_id      = 1;
  string organization_id = 2;
  string branch_id       = 3;
}

message ListBranchOperationsResponse {
  bool success = 1;
  optional string error = 2;
  repeated BranchOperationMessage operations = 3;
}

message BranchSetupStepMessage {
  string key     = 1;
  string label   = 2;
  bool   complete = 3;
  optional string detail = 4;
}

message GetBranchFacilitySetupStatusRequest {
  string company_id      = 1;
  string organization_id = 2;
  string branch_id       = 3;
}

message GetBranchFacilitySetupStatusResponse {
  bool success = 1;
  optional string error = 2;
  string facility_mode = 3;
  bool has_levels = 4;
  bool has_locations = 5;
  bool setup_complete = 6;
  repeated BranchSetupStepMessage steps = 7;
  repeated BranchOperationMessage operations = 8;
}

message ListFacilityBulkTemplatesRequest {
  string company_id = 1;
  string organization_id = 2;
  string branch_id = 3;
}

message FacilityBulkTemplateLevelMessage {
  string facility_node_level_id = 1;
  string node_type = 2;
  string level_name = 3;
  int32 count_per_parent = 4;
}

message FacilityBulkTemplateMessage {
  string template_id = 1;
  string name = 2;
  string description = 3;
  int32 estimated_total_nodes = 4;
  repeated FacilityBulkTemplateLevelMessage levels = 5;
}

message ListFacilityBulkTemplatesResponse {
  bool success = 1;
  optional string error = 2;
  repeated FacilityBulkTemplateMessage templates = 3;
}

message StartFacilityBulkCreateRequest {
  string company_id = 1;
  string organization_id = 2;
  string branch_id = 3;
  string template_id = 4;
  string user_id = 5;
}

message StartFacilityBulkCreateResponse {
  bool success = 1;
  optional string error = 2;
  string job_id = 3;
  int32 total = 4;
}

message OccupancyParticipantMessage {
  string participant_id = 1;
  string participant_role = 2;
  // PROFILE | PARTNER | GUEST | ANONYMOUS
  string identity_kind = 3;
  optional string profile_id = 4;
  optional string partner_id = 5;
  optional string display_name = 6;
  bool is_anonymous = 7;
  optional string email = 8;
  optional string phone_dial_code = 9;
  optional string phone_number = 10;
  optional string lookup_channel = 11;
  // profiles.guests — short-term visitor / hospitality CRM contact
  optional string guest_id = 12;
}

message OccupancyStayMessage {
  string stay_id = 1;
  string facility_node_id = 2;
  string branch_id = 3;
  string company_id = 4;
  string organization_id = 5;
  // TENANCY | ADMISSION | RESERVATION | VISIT | GENERAL
  string stay_kind = 6;
  string status = 7;
  string started_at = 8;
  optional string ended_at = 9;
  optional string evacuated_at = 10;
  optional string notes = 11;
  repeated OccupancyParticipantMessage participants = 12;
  string created_at = 13;
  string updated_at = 14;
  // For VISIT stays: links to the active TENANCY/ADMISSION stay on the same unit
  optional string host_stay_id = 15;
}

message OccupancyParticipantInput {
  string participant_role = 1;
  string identity_kind = 2;
  optional string profile_id = 3;
  optional string partner_id = 4;
  optional string display_name = 5;
  bool is_anonymous = 6;
  optional string email = 7;
  optional string phone_dial_code = 8;
  optional string phone_number = 9;
  optional string lookup_channel = 10;
  optional string guest_id = 11;
}

message CreateOccupancyStayRequest {
  string company_id = 1;
  string organization_id = 2;
  string branch_id = 3;
  string facility_node_id = 4;
  string stay_kind = 5;
  string started_at = 6;
  optional string notes = 7;
  string created_by = 8;
  repeated OccupancyParticipantInput participants = 9;
  optional string host_stay_id = 10;
}

message EndOccupancyStayRequest {
  string stay_id = 1;
  string company_id = 2;
  string organization_id = 3;
  string ended_at = 4;
  string status = 5;
  optional string notes = 6;
}

message EvacuateOccupancyStayRequest {
  string stay_id = 1;
  string company_id = 2;
  string organization_id = 3;
  string evacuated_at = 4;
  optional string notes = 5;
}

message GetActiveOccupancyStayRequest {
  string company_id = 1;
  string organization_id = 2;
  string facility_node_id = 3;
}

message ListOccupancyStaysRequest {
  string company_id = 1;
  string organization_id = 2;
  string branch_id = 3;
  optional string facility_node_id = 4;
  optional string status = 5;
  optional int32 page = 6;
  optional int32 page_size = 7;
  optional string guest_id = 8;
  optional string partner_id = 9;
  optional string stay_kind = 10;
}

message ListOccupancyStaysResponse {
  bool success = 1;
  optional string error = 2;
  repeated OccupancyStayMessage stays = 3;
  int32 total = 4;
}

message OccupancyStayResponse {
  bool success = 1;
  optional string error = 2;
  optional OccupancyStayMessage stay = 3;
}

message ListNodeOccupancyStayHistoryRequest {
  string company_id = 1;
  string organization_id = 2;
  string facility_node_id = 3;
}

message ListNodeOccupancyStayHistoryResponse {
  bool success = 1;
  optional string error = 2;
  repeated OccupancyStayMessage stays = 3;
}

message ListHospitalReceptionRequest {
  string company_id = 1;
  string organization_id = 2;
  string branch_id = 3;
  // ADMITTED | ENDED | ALL (all stays) | UNITS (stays + vacant) | VACANT
  optional string view = 4;
  optional string search = 5;
  optional int32 page = 6;
  optional int32 page_size = 7;
  // HOSPITAL | ESTATE | HOSPITALITY | RESTAURANT (default HOSPITAL)
  optional string reception_mode = 8;
  // occupant | location | started | ended | status | account
  optional string sort_by = 9;
  // asc | desc (default desc)
  optional string sort_dir = 10;
}

message HospitalReceptionStatsMessage {
  int32 admitted_count = 1;
  int32 vacant_count = 2;
  int32 occupiable_count = 3;
  int32 with_patient_details_count = 4;
  int32 ended_count = 5;
  int32 reserved_count = 6;
  int32 maintenance_count = 7;
}

message GetFacilityReceptionAnalyticsRequest {
  string company_id = 1;
  string organization_id = 2;
  string branch_id = 3;
  // HOSPITAL | ESTATE | HOSPITALITY | RESTAURANT (default HOSPITAL)
  optional string reception_mode = 4;
  // _1m | _3m | _6m | _1y | all — filters ended_count
  optional string timeline = 5;
  optional string start_date = 6;
  optional string end_date = 7;
}

message GetFacilityReceptionAnalyticsResponse {
  bool success = 1;
  optional string error = 2;
  HospitalReceptionStatsMessage stats = 3;
}

// Resolved platform user linked via profile_id or partner record.
message HospitalReceptionUserMessage {
  optional string profile_id = 1;
  optional string partner_id = 2;
  optional string email = 3;
  optional string phone_number = 4;
  optional string first_name = 5;
  optional string last_name = 6;
  // PROFILE | PARTNER | GUEST | CONTACT | NONE
  string match_source = 7;
  bool has_account = 8;
  optional string avatar_url = 9;
  optional string guest_id = 10;
}

// Patient or next-of-kin occupant on a stay.
message HospitalReceptionPersonMessage {
  string participant_id = 1;
  string participant_role = 2;
  string identity_kind = 3;
  optional string display_name = 4;
  bool is_anonymous = 5;
  optional HospitalReceptionUserMessage user = 6;
}

message HospitalReceptionLocationMessage {
  string facility_node_id = 1;
  string location_path = 2;
  repeated string location_path_segments = 3;
  string node_code = 4;
  string node_name = 5;
  string node_type = 6;
  optional string bed_type = 7;
  optional int32 capacity_max = 8;
}

message HospitalReceptionStayMessage {
  string stay_id = 1;
  string stay_kind = 2;
  string stay_status = 3;
  optional string admitted_at = 4;
  optional string discharged_at = 5;
  optional string evacuated_at = 6;
  optional string notes = 7;
}

message HospitalReceptionRowMessage {
  string row_id = 1;
  // active | ended | evacuated | vacant
  string reception_status = 2;
  HospitalReceptionLocationMessage location = 3;
  optional HospitalReceptionStayMessage stay = 4;
  optional HospitalReceptionPersonMessage patient = 5;
  optional HospitalReceptionPersonMessage next_of_kin = 6;
}

message ListHospitalReceptionResponse {
  bool success = 1;
  optional string error = 2;
  repeated HospitalReceptionRowMessage rows = 3;
  int32 total = 4;
}

message GetFacilityReceptionDetailRequest {
  string company_id = 1;
  string organization_id = 2;
  string branch_id = 3;
  // HOSPITAL | ESTATE | HOSPITALITY | RESTAURANT (default HOSPITAL)
  optional string reception_mode = 4;
  // Provide stay_id for occupant detail, or facility_node_id for vacant location detail.
  optional string stay_id = 5;
  optional string facility_node_id = 6;
}

message GetFacilityReceptionDetailResponse {
  bool success = 1;
  optional string error = 2;
  optional HospitalReceptionRowMessage row = 3;
}

message HasUserPriorOccupancyAtCompanyRequest {
  string company_id = 1;
  string organization_id = 2;
  string user_id = 3;
}

message HasUserPriorOccupancyAtCompanyResponse {
  bool success = 1;
  optional string error = 2;
  bool has_prior_occupancy = 3;
}

message FacilityAssetTypeTemplateMessage {
  string template_id = 1;
  string company_id = 2;
  string organization_id = 3;
  optional string branch_id = 4;
  string asset_kind = 5;
  string name = 6;
  optional string code = 7;
  bool is_active = 8;
  int32 sort_order = 9;
  string defaults_json = 10;
  string created_at = 11;
  string updated_at = 12;
}

message ListFacilityAssetTypeTemplatesRequest {
  string company_id = 1;
  string organization_id = 2;
  optional string branch_id = 3;
  optional string asset_kind = 4;
}

message ListFacilityAssetTypeTemplatesResponse {
  bool success = 1;
  optional string error = 2;
  repeated FacilityAssetTypeTemplateMessage templates = 3;
}

message UpsertFacilityAssetTypeTemplateRequest {
  string company_id = 1;
  string organization_id = 2;
  optional string branch_id = 3;
  optional string template_id = 4;
  string asset_kind = 5;
  string name = 6;
  optional string code = 7;
  bool is_active = 8;
  int32 sort_order = 9;
  string defaults_json = 10;
}

message UpsertFacilityAssetTypeTemplateResponse {
  bool success = 1;
  optional string error = 2;
  optional FacilityAssetTypeTemplateMessage template = 3;
}

message DeleteFacilityAssetTypeTemplateRequest {
  string company_id = 1;
  string organization_id = 2;
  string template_id = 3;
}

message DeleteFacilityAssetTypeTemplateResponse {
  bool success = 1;
  optional string error = 2;
}

message SearchPublicFacilityListingsRequest {
  // HOSPITAL | ESTATE | HOSPITALITY | RESTAURANT
  string facility_mode = 1;
  optional string hospitality_style = 2; // HOTEL | SHORT_STAY | BNB (filters metadata)
  int32 limit = 3;
}

message PublicFacilityListingMessage {
  string company_id = 1;
  string organization_id = 2;
  string branch_id = 3;
  string facility_mode = 4;
  optional string metadata_json = 5;
  optional string public_tagline = 6;
  optional string public_description = 7;
}

message SearchPublicFacilityListingsResponse {
  bool success = 1;
  optional string error = 2;
  repeated PublicFacilityListingMessage listings = 3;
}
