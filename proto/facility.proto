syntax = "proto3";

option csharp_namespace = "Facility.Grpc";

package facility;

import "google/protobuf/empty.proto";

service FacilityService {
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);

  rpc GetCompanyFacilityProfile(GetCompanyFacilityProfileRequest) returns (CompanyFacilityProfileResponse);
  rpc UpsertCompanyFacilityProfile(UpsertCompanyFacilityProfileRequest) returns (CompanyFacilityProfileResponse);

  rpc GetFacilityTree(GetFacilityTreeRequest) returns (GetFacilityTreeResponse);
  rpc SearchFacilityNodesByCode(SearchFacilityNodesByCodeRequest) returns (SearchFacilityNodesByCodeResponse);
  rpc GetFacilityNode(GetFacilityNodeRequest) returns (FacilityNodeResponse);
  rpc CreateFacilityNode(CreateFacilityNodeRequest) returns (FacilityNodeResponse);
  rpc UpdateFacilityNode(UpdateFacilityNodeRequest) returns (FacilityNodeResponse);
  rpc DeactivateFacilityNode(DeactivateFacilityNodeRequest) returns (FacilityNodeResponse);
  rpc GetAllowedChildNodeTypes(GetAllowedChildNodeTypesRequest) returns (GetAllowedChildNodeTypesResponse);
  rpc HasAnyFacilityNodes(HasAnyFacilityNodesRequest) returns (HasAnyFacilityNodesResponse);

  rpc GetFacilityNodeLevels(GetFacilityNodeLevelsRequest) returns (GetFacilityNodeLevelsResponse);
  rpc UpsertFacilityNodeLevels(UpsertFacilityNodeLevelsRequest) returns (UpsertFacilityNodeLevelsResponse);
  rpc DeleteFacilityNodeLevels(GetFacilityNodeLevelsRequest) returns (DeleteFacilityNodeLevelsResponse);

  rpc ListFacilityNodeTypes(google.protobuf.Empty) returns (ListFacilityNodeTypesResponse);

  rpc ListFacilityBulkTemplates(ListFacilityBulkTemplatesRequest) returns (ListFacilityBulkTemplatesResponse);
  rpc StartFacilityBulkCreate(StartFacilityBulkCreateRequest) returns (StartFacilityBulkCreateResponse);
}



enum FacilityMode {
  FACILITY_MODE_UNSPECIFIED = 0;
  GENERAL = 1;
  HOSPITAL = 2;
  ESTATE = 3;
  HOSPITALITY = 4;
}

enum FacilityNodeType {
  FACILITY_NODE_TYPE_UNSPECIFIED = 0;
  BLOCK = 1;
  BUILDING = 2;
  WARD = 3;
  UNIT = 4;
  ROOM = 5;
  BED = 6;
  FLOOR = 7;
  WING = 8;
  HOUSE = 9;
  TABLE = 10;
  ZONE = 11;
  SECTION = 12;
  SITE = 13;
}

enum SpatialOrientation {
  SPATIAL_ORIENTATION_UNSPECIFIED = 0;
  NORTH = 1;
  EAST = 2;
  SOUTH = 3;
  WEST = 4;
}

enum FacilityAssetKind {
  FACILITY_ASSET_KIND_UNSPECIFIED = 0;
  ASSET_KIND_BED = 1;
  ASSET_KIND_ROOM = 2;
  ASSET_KIND_TABLE = 3;
  ASSET_KIND_HOUSE = 4;
  ASSET_KIND_UNIT = 5;
  ASSET_KIND_SECTION = 6;
}

enum FacilityStatus {
  FACILITY_STATUS_UNSPECIFIED = 0;
  AVAILABLE = 1;
  MAINTENANCE = 2;
  TEMPORARILY_OUT_OF_COMMISSION = 3;
  OUT_OF_SERVICE = 4;
  RESERVED = 5;
}

message FacilityNodeTypeMessage {
  string             slug         = 1; // e.g. "annual"
  string             display_name = 2; // e.g. "Annual Leave"
  FacilityNodeType          type         = 3;
}
  
message  ListFacilityNodeTypesResponse {
  repeated FacilityNodeTypeMessage node_types = 1;

}

message GetFacilityNodeLevelsRequest {
  string company_id = 1;
  string organization_id = 2;
  string branch_id = 3;
}

message GetFacilityNodeLevelsResponse {
  bool success = 1;
  optional string error = 2;
  repeated FacilityNodeLevelMessage levels = 3;
}

message HealthCheckRequest {}

message HealthCheckResponse {
  bool success = 1;
  string message = 2;
}

message CompanyFacilityProfileMessage {
  string company_id = 1;
  string organization_id = 2;
  string facility_mode = 3;
  optional string metadata_json = 4;
  optional string layout_settings_json = 5;
  string branch_id = 6;
}

message GetCompanyFacilityProfileRequest {
  string company_id = 1;
  string organization_id = 2;
  string branch_id = 3;
}

message UpsertCompanyFacilityProfileRequest {
  string company_id = 1;
  string organization_id = 2;
  FacilityMode facility_mode = 3;
  optional string metadata_json = 4;
  string branch_id = 5;
}

message CompanyFacilityProfileResponse {
  bool success = 1;
  optional string error = 2;
  optional CompanyFacilityProfileMessage profile = 3;
}

message FacilityNodeLevelUpsertMessage {
  FacilityNodeType node_type = 1;
  int32 level_number = 2;
  reserved 3, 4; // removed: name, description (labels come from node_type)
  optional string color = 5;
  bool is_active = 6;
}

message FacilityNodeLevelMessage {
  string facility_node_level_id = 1;
  string organization_id = 2;
  string company_id = 3;
  string branch_id = 4;
  string node_type = 5;
  reserved 6, 7; // removed: name, description
  int32 level_number = 8;
  optional string color = 9;
  bool is_active = 10;
  string created_at = 11;
  string updated_at = 12;
  optional string deleted_at = 13;
}

message UpsertFacilityNodeLevelsRequest {
  string company_id = 1;
  string organization_id = 2;
  string branch_id = 3;
  repeated FacilityNodeLevelUpsertMessage levels = 4;
}

message UpsertFacilityNodeLevelsResponse {
  bool success = 1;
  optional string error = 2;
  repeated FacilityNodeLevelMessage levels = 3;
}

message DeleteFacilityNodeLevelsRequest {
  string company_id = 1;
  string organization_id = 2;
  string branch_id = 3;
  repeated FacilityNodeType node_types = 4;
}

message DeleteFacilityNodeLevelsResponse {
  bool success = 1;
  optional string error = 2;
  repeated FacilityNodeLevelMessage levels = 3;
}

message FacilityNodeMessage {
  string facility_node_id = 1;
  string organization_id = 2;
  string company_id = 3;
  string branch_id = 4;
  optional string parent_facility_node_id = 5;
  optional string code = 6;
  string name = 7;
  bool is_active = 8;
  // Extensible JSON: description, space { area_sq_m, length_m, width_m, height_m, ... } (metres).
  optional string metadata_json = 9;
  repeated FacilityNodeMessage children = 10;
  int32 child_count = 11;
  optional FacilityStatus status = 12;
  optional string node_level_id = 13;
  optional FacilityNodeLevelMessage node_level = 14;
  optional string description = 15;
  optional SpatialOrientation orientation = 16;
  optional string spatial_position_json = 17;
  int32 sort_order = 18;
  optional FacilityNodeAssetMessage asset = 19;
}

message FacilityNodeAssetMessage {
  string facility_node_id = 1;
  FacilityAssetKind asset_kind = 2;
  int32 capacity_max = 3;
  optional string metadata_json = 4;
}

// Occupancy profile when creating/updating occupiable nodes (bed, room, table, …).
message FacilityNodeAssetSetupMessage {
  // Override inferred kind from node_type; omit to infer from level.
  optional FacilityAssetKind asset_kind = 1;
  // Max occupants (tenants, patients, seats). 0 = use branch/mode defaults.
  int32 capacity_max = 2;
  optional string metadata_json = 3;
}

message GetFacilityTreeRequest {
  string branch_id = 1;
  string company_id = 2;
  string organization_id = 3;
  bool include_inactive = 4;
  bool shallow = 5;
  optional string parent_facility_node_id = 6;
}

message GetFacilityTreeResponse {
  bool success = 1;
  optional string error = 2;
  repeated FacilityNodeMessage nodes = 3;
}

message FacilityNodePathSegment {
  string facility_node_id = 1;
  string name = 2;
  string code = 3;
  optional string node_type = 4;
}

message FacilityNodeSearchMatch {
  FacilityNodeMessage node = 1;
  repeated FacilityNodePathSegment ancestors = 2;
}

message SearchFacilityNodesByCodeRequest {
  string branch_id = 1;
  string company_id = 2;
  string organization_id = 3;
  string code = 4;
  bool include_inactive = 5;
  int32 limit = 6;
}

message SearchFacilityNodesByCodeResponse {
  bool success = 1;
  optional string error = 2;
  repeated FacilityNodeSearchMatch matches = 3;
}

message GetFacilityNodeRequest {
  string facility_node_id = 1;
  string company_id = 2;
  string organization_id = 3;
}

message CreateFacilityNodeRequest {
  string organization_id = 1;
  string company_id = 2;
  string branch_id = 3;
  optional string parent_facility_node_id = 4;
  string name = 6;
  optional string description = 7;
  // Extensible JSON: description, space { area_sq_m, length_m, width_m, height_m, ... } (metres).
  optional string metadata_json = 9;
  optional FacilityStatus status = 10;
  optional string node_level_id = 11;
  optional SpatialOrientation orientation = 12;
  optional string spatial_position_json = 13;
  optional int32 sort_order = 14;
  optional FacilityNodeAssetSetupMessage asset_setup = 15;
}

message UpdateFacilityNodeRequest {
  string facility_node_id = 1;
  string company_id = 2;
  string organization_id = 3;
  optional string code = 4;
  optional string name = 5;
  optional string metadata_json = 6;
  optional bool is_active = 7;
  optional FacilityStatus status = 8;
  optional string description = 9;
  optional SpatialOrientation orientation = 10;
  optional string spatial_position_json = 11;
  optional int32 sort_order = 12;
  optional FacilityNodeAssetSetupMessage asset_setup = 13;
}

message DeactivateFacilityNodeRequest {
  string facility_node_id = 1;
  string company_id = 2;
  string organization_id = 3;
}

message FacilityNodeResponse {
  bool success = 1;
  optional string error = 2;
  optional FacilityNodeMessage node = 3;
}

message GetAllowedChildNodeTypesRequest {
  string company_id = 1;
  string organization_id = 2;
  // Empty / omitted = root level (lowest level_number).
  optional string parent_node_level_id = 3;
  string branch_id = 4;
}

message GetAllowedChildNodeTypesResponse {
  bool success = 1;
  optional string error = 2;
  repeated FacilityNodeLevelMessage levels = 3;
}

message HasAnyFacilityNodesRequest {
  string company_id = 1;
  string organization_id = 2;
}

message HasAnyFacilityNodesResponse {
  bool success = 1;
  optional string error = 2;
  bool has_any_nodes = 3;
  int32 node_count = 4;
}

message ListFacilityBulkTemplatesRequest {
  string company_id = 1;
  string organization_id = 2;
  string branch_id = 3;
}

message FacilityBulkTemplateLevelMessage {
  string facility_node_level_id = 1;
  string node_type = 2;
  string level_name = 3;
  int32 count_per_parent = 4;
}

message FacilityBulkTemplateMessage {
  string template_id = 1;
  string name = 2;
  string description = 3;
  int32 estimated_total_nodes = 4;
  repeated FacilityBulkTemplateLevelMessage levels = 5;
}

message ListFacilityBulkTemplatesResponse {
  bool success = 1;
  optional string error = 2;
  repeated FacilityBulkTemplateMessage templates = 3;
}

message StartFacilityBulkCreateRequest {
  string company_id = 1;
  string organization_id = 2;
  string branch_id = 3;
  string template_id = 4;
  string user_id = 5;
}

message StartFacilityBulkCreateResponse {
  bool success = 1;
  optional string error = 2;
  string job_id = 3;
  int32 total = 4;
}
