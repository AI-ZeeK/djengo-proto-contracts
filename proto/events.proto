  int32  requests      = 3;
  int32  approved      = 4;
  int32  pending       = 5;
  int32  rejected      = 6;
}
message GetLeaveAnalyticsResponse {
  int32  total_requests  = 1;
  int32  approved        = 2;
  int32  pending         = 3;
  int32  rejected        = 4;
  int32  cancelled       = 5;
  int32  total_days_taken = 6;
  repeated LeaveTypeSummary by_type = 7;
}

