  string company_id      = 1;
  string organization_id = 2;
  string staff_id        = 3;
  string leave_policy_id = 4;
  int32  year            = 5;
  int32  allocated_days  = 6;
  int32  carried_over    = 7;
}

message BulkAllocateRequest {
  string company_id = 1;
  int32  year       = 2;
  // If empty, allocates for all active policies in the company.
  repeated string leave_policy_ids = 3;
}
message BulkAllocateResponse {
  int32  staff_count    = 1;
  int32  records_upserted = 2;
  string message        = 3;
}

message RolloverRequest {
  string company_id  = 1;
  int32  from_year   = 2;  // year being closed
  int32  to_year     = 3;  // new year
}
message RolloverResponse {
  int32  staff_count = 1;
  string message     = 2;
}


// ─── HR: Leave Request ───────────────────────────────────────────────────────

