// ─── HR: Leave Balance ───────────────────────────────────────────────────────

message LeaveBalance {
  string leave_balance_id  = 1;
  string staff_id          = 2;
  string leave_policy_id   = 3;
  int32  year              = 4;
  int32  allocated_days    = 5;
  int32  used_days         = 6;
  int32  pending_days      = 7;
  int32  carried_over      = 8;
  int32  remaining_days    = 9; // computed: allocated + carried - used - pending
  string created_at        = 10;
  string updated_at        = 11;
  string company_id        = 12;
  string organization_id   = 13;
  Staff  staff = 14; // populated on approval, links to the StaffEvent for this leave request
}
message GetLeaveBalanceResponse { LeaveBalance balance = 1; string message = 2; }
message LeaveBalanceId             { string leave_balance_id = 1; }
message LeaveBalanceList           { repeated LeaveBalance balances = 1; string message = 2; TableMeta meta = 3; }
