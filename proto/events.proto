
syntax = "proto3";

package events;

option csharp_namespace = "Events.Grpc";


import "google/protobuf/empty.proto";


// ─── Services ─────────────────────────────────────────────────────────────

/// Manages ApprovalChain templates and their steps (admin / company setup).
/// One chain per entity type per company.
/// Steps are always managed inline with the chain — no separate step endpoints.
service ApprovalChainService {
  // Entity type catalogue
  rpc ListApprovalEntityTypes  (google.protobuf.Empty)           returns (ListApprovalEntityTypesResponse);

  // Fetch chain + all current steps by entity type slug.
  // Returns NOT_FOUND if no chain exists yet for this company + entity type.
  rpc GetApprovalChain         (GetApprovalChainBySlugRequest)   returns (ApprovalChainWithSteps);
  rpc ListApprovalChains         (ListApprovalChainsRequest)   returns (ListApprovalChainsResponse);

  // Create or update the chain and atomically replace its steps.
  rpc UpsertApprovalChain      (UpsertApprovalChainRequest)      returns (ApprovalChainWithSteps);

  rpc DeleteApprovalChain      (GetApprovalChainRequest)         returns (DeleteResponse);
}


/// Manages live Approval instances for specific entities, and their step decisions.
service ApprovalService {
  // Approval lifecycle
  rpc CreateApproval      (CreateApprovalRequest)       returns (Approval);
  rpc GetApproval         (GetApprovalRequest)           returns (Approval);
  rpc ListApprovals       (ListApprovalsRequest)         returns (ListApprovalsResponse);
  rpc CloseApproval       (CloseApprovalRequest)        returns (CloseApprovalResponse);

  // Step decisions
  rpc ApproveStep         (ApproveApprovalStepRequest)  returns (ApproveApprovalStepResponse);
  rpc RejectStep          (RejectApprovalStepRequest)   returns (RejectApprovalStepResponse);
  rpc ListApprovalSteps   (ListApprovalStepsRequest)    returns (ListApprovalStepsResponse);
}

