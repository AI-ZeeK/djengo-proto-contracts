enum CalendarRecurrencePreset {
  RECURRENCE_NONE = 0;
  RECURRENCE_DAILY = 1;
  RECURRENCE_WEEKLY_SAME_WEEKDAY = 2;
  RECURRENCE_MONTHLY_SAME_MONTHDAY = 3;
  RECURRENCE_MONTHLY_NTH_WEEKDAY = 4;
}

message CreateCalendarEventRequest {
  string company_id = 1;
  string organization_id = 2;
  string title = 3;
  string description = 4;
  optional string date = 5;
  optional string start_time = 6;
  optional string end_time = 7;
  optional string start_date = 8;
  optional string end_date = 9;
  string event_type = 10;
  string color = 11;
  bool is_all_day = 12;
  bool is_multiple_days = 13;
  string created_by_user_id = 14;
  string recurrence_rule = 15;
  bool is_recurring = 16;
  CalendarRecurrencePreset recurrence_preset = 17;
  /// Last calendar day (yyyy-MM-dd, inclusive) the series repeats; RRULE gains UNTIL.
  optional string recurrence_series_end_date = 18;
}


message UpdateCalendarEventRequest {
  string calendar_event_id = 1;
  string company_id = 2;
  string organization_id = 3;
  string title = 4;
  string description = 5;
  optional string date = 6;
  optional string start_time = 7;
  optional string end_time = 8;
  optional string start_date = 9;
  optional string end_date = 10;
  string event_type = 11;
  string color = 12;
  bool is_all_day = 13;
  bool is_multiple_days = 14;
  string created_by_user_id = 15;
  string recurrence_rule = 16;
  bool is_recurring = 17;
  CalendarRecurrencePreset recurrence_preset = 18;
  optional string recurrence_series_end_date = 19;
}

