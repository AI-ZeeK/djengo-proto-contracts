// ─── CalendarEvent ───────────────────────────────────────────────────────────

message CalendarEvent {
  string event_id             = 1;
  string company_id           = 2;
  string title                = 3;
  string description          = 4;
  string start_time           = 5;
  string end_time             = 6;
  string event_type           = 7;
  bool   is_all_day           = 8;
  string color                = 9;
  bool   is_recurring         = 10;
  string recurrence_rule      = 11;
  string created_by_user_id  = 12;
  // bool   is_private           = 13;
  bool   is_active            = 14;
  // string system_event_id      = 15;
  // string system_event_type    = 16;
  // string system_event_data    = 17;
  // bool   notification_sent    = 18;
  string task_id              = 19;
  string created_at           = 20;
  string updated_at           = 21;
  string deleted_at           = 22;
  string organization_id      = 23;
  // Polymorphic ownership
  string entity_type          = 24;  // COMPANY | ORGANIZATION | STAFF | BRANCH | DEPARTMENT
  string entity_id            = 25;  // PK of the owning entity
  // Business calendar classification
  // string calendar_category    = 26;  // Deprecated: mirror of event_type (uppercase). Use event_type only; same enum names (HOLIDAY, MAINTENANCE, …).
  string country_code         = 27;  // ISO code for imported public holidays
}

message CalendarEventRef            { string event_id = 1; }
