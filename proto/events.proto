// --- Approval Step Actions ---
// ─── ENUMS ────────────────────────────────────────────────────────────────

/// Status of a live Approval instance.
enum ApprovalInstanceStatus {
  APPROVAL_INSTANCE_STATUS_UNSPECIFIED = 0;
  APPROVAL_INSTANCE_PENDING            = 1;
  APPROVAL_INSTANCE_IN_PROGRESS        = 2;
  APPROVAL_INSTANCE_APPROVED           = 3;
  APPROVAL_INSTANCE_REJECTED           = 4;
  APPROVAL_INSTANCE_CLOSED             = 5;
}

/// Status of a single live ApprovalStep.
enum ApprovalStatus {
  APPROVAL_STATUS_UNSPECIFIED = 0;
  PENDING  = 1;
  APPROVED = 2;
  REJECTED = 3;
}

enum ApprovalEntityType {
  APPROVAL_ENTITY_TYPE_UNSPECIFIED = 0;
  PAYROLL = 1;
  BUDGET  = 2;
  LEAVE   = 3;
}

message TableMeta {
  int32 total       = 1;
  int32 current_page = 2;
  int32 page_size   = 3;
  int32 total_pages = 4;
  int32 next_page   = 5;
  int32 prev_page   = 6;
}

enum LeaveType {
  LEAVE_TYPE_UNSPECIFIED = 0;
  ANNUAL = 1;
  SICK   = 2;
  UNPAID = 3;
  MATERNITY = 4;
  PATERNITY = 5;
  STUDY = 6;
  COMPASSIONATE = 7;
  OTHER = 8;
}

// ─── ApprovalEntityType info ──────────────────────────────────────────────

message ApprovalEntityTypeInfo {
  string             slug         = 1; // e.g. "payroll"
  string             display_name = 2; // e.g. "Payroll"
  ApprovalEntityType type         = 3;
}
message LeaveTypeInfo {
  string             slug         = 1; // e.g. "annual"
  string             display_name = 2; // e.g. "Annual Leave"
  LeaveType          type         = 3;
}

message ListApprovalEntityTypesResponse {
  repeated ApprovalEntityTypeInfo types = 1;
}
message ListLeaveTypesResponse {
  repeated LeaveTypeInfo types = 1;
}

// ─── Approval Chain (template) ────────────────────────────────────────────
// Defines the company-wide hierarchy of approvers for a given entity type.
// One chain per entity type per company. Not tied to any live entity instance.

message ApprovalChainStep {
  string approval_chain_step_id = 1;
  string approval_chain_id      = 2;
  int32  step_order             = 3;
  string role_id                = 4;
  string role_type              = 5; // BUSINESS_USER or STAFF
  string description            = 6;
  string created_at             = 7;
  string updated_at             = 8;
}

/// Returned by GetApprovalChain — includes all steps inline.
message ApprovalChainWithSteps {
  string             approval_chain_id = 1;
  ApprovalEntityType entity_type       = 2;
  string             entity_type_slug  = 3; // e.g. "payroll"
  string             organization_id   = 4;
  string             company_id        = 5;
  string             name              = 6;
  bool               is_active         = 7;
  string             created_at        = 8;
  string             updated_at        = 9;
  repeated ApprovalChainStep steps     = 10;
}

/// Lightweight chain (no steps) — used in list responses.
message ApprovalChain {
  string             approval_chain_id = 1;
  ApprovalEntityType entity_type       = 2;
  string             entity_type_slug  = 3;
  string             organization_id   = 4;
  string             company_id        = 5;
  string             name              = 6;
  bool               is_active         = 7;
  string             created_at        = 8;
  string             updated_at        = 9;
}

// ─── Approval Chain requests ──────────────────────────────────────────────

/// Fetch a chain (+ steps) by entity type slug for a specific company.
/// If the chain doesn't exist yet, the frontend knows to create one.
message GetApprovalChainBySlugRequest {
  string entity_type_slug = 1; // e.g. "payroll"
  string company_id       = 2;
  string organization_id  = 3;
}

/// Create or update the chain for a given entity type + company (upsert).
/// Each company can only have ONE chain per entity type.
/// Steps are always passed in full — they replace the existing steps atomically.
message UpsertApprovalChainStepInput {
  int32  step_order   = 1;
  string role_id      = 2;
  string role_type    = 3; // BUSINESS_USER or STAFF
  string description  = 4;
}

message UpsertApprovalChainRequest {
  string                              entity_type_slug = 1; // used to resolve ApprovalEntityType
  string                              organization_id  = 2;
  string                              company_id       = 3;
  string                              name             = 4;
  bool                                is_active        = 5;
  repeated UpsertApprovalChainStepInput steps          = 6; // replaces all existing steps
}

message GetApprovalChainRequest {
  string approval_chain_id = 1;
}

// ─── Approval (live instance) ──────────────────────────────────────────────
// Created when a specific entity (payroll run, leave request, budget) enters
// the approval workflow. Derived from an ApprovalChain template.

message Approval {
  string                 approval_id        = 1;
  string                 approval_chain_id  = 2;
  ApprovalEntityType     entity_type        = 3;
  string                 entity_id          = 4;
  string                 organization_id    = 5;
  string                 company_id         = 6;
  ApprovalInstanceStatus status             = 7;
  int32                  current_step_order = 8;
  int32                  total_steps        = 9;
  string                 initiator_user_id  = 10;
  string                 created_at         = 11;
  string                 updated_at         = 12;
  string                 completed_at       = 13;
  string                 closed_at          = 14;
  string                 closed_by_user_id  = 15;
  string                 closed_comment     = 16;
}

/// Live step — tracks an actual approve/reject decision.
message ApprovalStep {
  string         approval_step_id = 1;
  string         approval_id      = 2;
  int32          step_order       = 3;
  string         role_id          = 4;
  string         role_type        = 5;
  string         approver_user_id = 6;
  ApprovalStatus status           = 7;
  string         approved_at      = 8;
  string         comment          = 9;
  string         created_at       = 10;
  string         updated_at       = 11;
}

// ─── Approval requests ────────────────────────────────────────────────────

message CreateApprovalRequest {
  string             approval_chain_id = 1; // chain template to derive steps from
  ApprovalEntityType entity_type       = 2;
  string             entity_id         = 3;
  string             organization_id   = 4;
  string             company_id        = 5;
  string             initiator_user_id = 6;
}

message GetApprovalRequest {
  string approval_id = 1;
}

message ListApprovalsRequest {
  string             entity_id       = 1;
  ApprovalEntityType entity_type     = 2;
  string             company_id      = 3;
  string             organization_id = 4;
  int32              page            = 5;
  int32              page_size       = 6;
  string             sort_by         = 7;
  string             sort_order      = 8; // "asc" | "desc"
}

message ListApprovalsResponse {
  repeated Approval approvals = 1;
  TableMeta         meta      = 2;
}

message ListApprovalStepsRequest {
  string approval_id = 1;
  int32  page        = 2;
  int32  page_size   = 3;
  string sort_by     = 4; // e.g. "step_order"
  string sort_order  = 5; // "asc" | "desc"
}

message ListApprovalStepsResponse {
  repeated ApprovalStep steps = 1;
  TableMeta             meta  = 2;
}

message CloseApprovalRequest {
  string approval_id       = 1;
  string closed_by_user_id = 2;
  string closed_comment    = 3;
}

message CloseApprovalResponse {
  bool     success  = 1;
  string   message  = 2;
  Approval approval = 3;
}

message ApproveApprovalStepRequest {
  string approval_id        = 1;
  string approver_user_id   = 2;
  string approver_role_id   = 3;
  string approver_role_type = 4;
  string comment            = 5;
}

message ApproveApprovalStepResponse {
  bool     success  = 1;
  string   message  = 2;
  Approval approval = 3;
}

message RejectApprovalStepRequest {
  string approval_id        = 1;
  string approver_user_id   = 2;
  string approver_role_id   = 3;
  string approver_role_type = 4;
  string comment            = 5;
}

message RejectApprovalStepResponse {
  bool     success  = 1;
  string   message  = 2;
  Approval approval = 3;
}

// ─── Leave Analytics Overview ─────────────────────────────────────────────────

enum LeaveTimeline {
  LEAVE_1M  = 0;
  LEAVE_3M  = 1;
  LEAVE_6M  = 2;
  LEAVE_1Y  = 3;
  LEAVE_ALL = 4;
}

message LeaveChartData {
  string name  = 1;
  double value = 2;
}

message LeaveOverviewCard {
  string title       = 1;
  double total       = 2;
  string trend       = 3;
  double percentage  = 4;
  string description = 5;
  repeated LeaveChartData chart_data = 6;
}

message LeaveOverviewChart {
  string title      = 1;
  string type       = 2;
  string data_key   = 3;
  string color      = 4;
  string trend      = 5;
  double percentage = 6;
  repeated LeaveChartData data = 7;
}

message GetLeaveAnalyticsOverviewRequest {
  string        company_id      = 1;
  LeaveTimeline timeline        = 2;
  string        start_date      = 3;
  string        end_date        = 4;
  string        organization_id = 5;
}

message GetLeaveAnalyticsOverviewResponse {
  repeated LeaveOverviewCard  cards  = 1;
  repeated LeaveOverviewChart charts = 2;
  string                      period_label = 3;
}

// ─── Complaints ───────────────────────────────────────────────────────────────

service ComplaintService {
  rpc CreateComplaint        (CreateComplaintRequest)        returns (ComplaintId);
  rpc GetComplaint           (ComplaintId)                   returns (Complaint);
  rpc ListComplaints         (ListComplaintsRequest)         returns (ListComplaintsResponse);
  rpc ListMyComplaints       (MyComplaintsRequest)           returns (ListComplaintsResponse);
  rpc UpdateComplaintStatus  (UpdateComplaintStatusRequest)  returns (Complaint);
  rpc AssignComplaint        (AssignComplaintRequest)        returns (Complaint);
}

message ComplaintId {
  string complaint_id = 1;
}

message Complaint {
  string complaint_id      = 1;
  string complainant_id    = 2;
  string organization_id   = 3;
  string company_id        = 4;
  string category          = 5;
  string subject           = 6;
  string description       = 7;
  string status            = 8;
  string priority          = 9;
  repeated string attachments = 10;
  string assigned_to       = 11;
  string resolved_by       = 12;
  string resolution_notes  = 13;
  string created_at        = 14;
  string updated_at        = 15;
  string resolved_at       = 16;
  string complaint_target  = 17;
  bool   is_anonymous      = 18;
}

message CreateComplaintRequest {
  string complainant_id   = 1;
  string organization_id  = 2;
  string company_id       = 3;
  string category         = 4;
  string subject          = 5;
  string description      = 6;
  string priority         = 7;
  repeated string attachments = 8;
  string complaint_target = 9;
  bool   is_anonymous     = 10;
}

message ListComplaintsRequest {
  string company_id       = 1;
  string organization_id  = 2;
  string status           = 3;
  string category         = 4;
  string priority         = 5;
  string assigned_to      = 6;
  int32  page             = 7;
  int32  page_size        = 8;
  string sort_by          = 9;
  string sort_order       = 10;
  string complaint_target = 11;
}

message MyComplaintsRequest {
  string complainant_id = 1;
  string company_id     = 2;
  int32  page           = 3;
  int32  page_size      = 4;
}

message ListComplaintsResponse {
  repeated Complaint complaints = 1;
  TableMeta          meta       = 2;
}

message UpdateComplaintStatusRequest {
  string complaint_id     = 1;
  string status           = 2;
  string resolution_notes = 3;
  string resolved_by      = 4;
}

message AssignComplaintRequest {
  string complaint_id = 1;
  string assigned_to  = 2;
}

// ─── Complaint Categories ─────────────────────────────────────────────────────

service ComplaintCategoryService {
  rpc ListComplaintCategories   (ListComplaintCategoriesRequest)   returns (ListComplaintCategoriesResponse);
  rpc GetComplaintCategory      (ComplaintCategoryId)              returns (ComplaintCategoryProto);
  rpc CreateComplaintCategory   (CreateComplaintCategoryRequest)   returns (ComplaintCategoryProto);
  rpc UpdateComplaintCategory   (UpdateComplaintCategoryRequest)   returns (ComplaintCategoryProto);
  rpc DeleteComplaintCategory   (ComplaintCategoryId)              returns (DeleteResponse);
}

message ComplaintCategoryId {
  string category_id = 1;
}

message ComplaintCategoryProto {
  string category_id = 1;
  string name        = 2;
  string slug        = 3;
  string description = 4;
  string icon        = 5;
  bool   is_active   = 6;
  int32  sort_order  = 7;
  string created_at  = 8;
  string updated_at  = 9;
}

message ListComplaintCategoriesRequest {
  bool include_inactive = 1;
}

message ListComplaintCategoriesResponse {
  repeated ComplaintCategoryProto categories = 1;
}

message CreateComplaintCategoryRequest {
  string name        = 1;
  string slug        = 2;
  string description = 3;
  string icon        = 4;
  int32  sort_order  = 5;
}

message UpdateComplaintCategoryRequest {
  string category_id = 1;
  string name        = 2;
  string description = 3;
  string icon        = 4;
  bool   is_active   = 5;
  int32  sort_order  = 6;
}
