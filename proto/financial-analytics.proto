syntax = "proto3";

option csharp_namespace = "Financials.Grpc";

package financial_analytics;

service AnalyticsService {
  rpc GetCompanyFinancialAnalytics (CompanyFinancialAnalyticsRequest) returns (CompanyFinancialAnalyticsResponse);

  // Returns only the flexible periodical growth trend data for a company (for charting)
  rpc GetCompanyGrowthTrend (CompanyGrowthTrendRequest) returns (CompanyGrowthTrendResponse);

// Request for company growth trend data
}
message CompanyGrowthTrendRequest {
  string companyId = 1;
  Timeline timeline = 2;
  string startDate = 3;
  string endDate = 4;
}

// Response for company growth trend data
message CompanyGrowthTrendResponse {
  repeated ChartData chart_data = 1;
}

message CompanyFinancialAnalyticsRequest {
  string companyId = 1;
  string organizationId = 2;
  Timeline timeline = 3;
  string startDate = 4;
  string endDate = 5;
  TransactionCategory category = 6;
}

message CompanyFinancialAnalyticsResponse {
  double amount = 1;
  string trend = 2;
  double percentage = 3;
  repeated ChartData chart_data = 4;
}

message ChartData {
  string name = 1;
  double value = 2;
}

enum Timeline {
  _1m = 0;
  _3m = 1;
  _6m = 2;
  _1y = 3;
  all = 4;
}
  
 enum TransactionCategory {
    Salary = 0;
    Budget = 1;
    Order = 2;
    Expense = 3;
    Deposit = 4;
    Withdrawal = 5;
    Transfer = 6;
}